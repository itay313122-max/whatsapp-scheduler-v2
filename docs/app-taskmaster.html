<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb">
<meta name="application-name" content="TaskMaster">
<meta name="apple-mobile-web-app-title" content="TaskMaster">
<meta name="description" content="TaskMaster - ניהול משימות חכם">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="data:application/json,{}">
<title>TaskMaster - ניהול משימות</title>
<style>
:root {
  --c-from: #2563eb;
  --c-to: #3b82f6;
  --c-primary: #2563eb;
  --c-primary-light: #dbeafe;
  --c-primary-dark: #1d4ed8;
  --c-bg: #f0f4ff;
  --c-card: #ffffff;
  --c-text: #1e293b;
  --c-text-secondary: #64748b;
  --c-text-light: #94a3b8;
  --c-border: #e2e8f0;
  --c-success: #22c55e;
  --c-success-light: #dcfce7;
  --c-warning: #f59e0b;
  --c-warning-light: #fef3c7;
  --c-danger: #ef4444;
  --c-danger-light: #fee2e2;
  --c-orange: #f97316;
  --c-orange-light: #fff7ed;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 6px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.08);
  --shadow-xl: 0 8px 16px rgba(0,0,0,0.08), 0 20px 40px rgba(0,0,0,0.1);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.6;
  direction: rtl;
  max-width: 420px;
  margin: 0 auto;
  position: relative;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Keyframe Animations ── */

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 8px rgba(255,255,255,0.15); }
  50% { box-shadow: 0 0 20px rgba(255,255,255,0.35); }
}

@keyframes confetti {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.3) rotate(10deg); opacity: 0.8; }
  100% { transform: scale(0) rotate(25deg); opacity: 0; }
}

@keyframes iconPulse {
  0%, 100% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.1); }
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

@keyframes iconSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes iconBounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
  50% { transform: translateY(0); }
  70% { transform: translateY(-3px); }
}

@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(15px, -10px) scale(1.05); }
  66% { transform: translate(-10px, 8px) scale(0.95); }
}

@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-12px, 12px) scale(1.08); }
  66% { transform: translate(8px, -15px) scale(0.92); }
}

@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(10px, 10px) scale(1.1); }
}

@keyframes statGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 12px 2px rgba(255,255,255,0.15); }
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

@keyframes shimmerOverlay {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(30px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateX(0) scale(1);
  }
}

@keyframes slideOut {
  to {
    opacity: 0;
    transform: translateX(-100px) scale(0.9);
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    margin-bottom: -10px;
  }
}

@keyframes fabPulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(37,99,235,0.4); }
  50% { box-shadow: 0 4px 24px rgba(37,99,235,0.6), 0 0 40px rgba(129,140,248,0.3); }
}

@keyframes checkPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

@keyframes emptyFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-12px) rotate(3deg); }
}

@keyframes emptyOrb {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.2); opacity: 0.6; }
}

@keyframes celebrateStar {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 0.8; }
  100% { transform: scale(0) rotate(360deg); opacity: 0; }
}

@keyframes filterSlide {
  from { transform: scaleX(0); opacity: 0; }
  to { transform: scaleX(1); opacity: 1; }
}

/* ── Header Banner ── */
.header {
  background: linear-gradient(135deg, var(--c-from) 0%, var(--c-to) 50%, #818cf8 100%);
  padding: 20px 20px 28px;
  position: relative;
  overflow: hidden;
}

/* Animated decorative orbs in header */
.header-orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.header-orb-1 {
  top: -30px;
  left: -30px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 70%);
  animation: orbFloat1 8s ease-in-out infinite;
}

.header-orb-2 {
  bottom: -25px;
  right: 20px;
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.01) 70%);
  animation: orbFloat2 10s ease-in-out infinite;
}

.header-orb-3 {
  top: 15px;
  right: 40%;
  width: 50px;
  height: 50px;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
  animation: orbFloat3 6s ease-in-out infinite;
}

.header-orb-4 {
  bottom: 30px;
  left: 30%;
  width: 35px;
  height: 35px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  animation: orbFloat1 7s ease-in-out infinite reverse;
}

.header-orb-5 {
  top: 40px;
  left: 70%;
  width: 25px;
  height: 25px;
  background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
  animation: orbFloat2 9s ease-in-out infinite;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}

.header-title {
  color: #fff;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.header-subtitle {
  color: rgba(255,255,255,0.8);
  font-size: 13px;
  font-weight: 400;
  margin-top: 2px;
}

.header-date {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
  background: rgba(255,255,255,0.15);
  padding: 6px 14px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
}

/* Stats Cards in Header */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  position: relative;
  z-index: 1;
}

.stat-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.12);
  transition: transform var(--transition);
  animation: statGlow 3s ease-in-out infinite;
}

.stat-card:nth-child(2) {
  animation-delay: 1s;
}

.stat-card:nth-child(3) {
  animation-delay: 2s;
}

.stat-card:active {
  transform: scale(0.96);
}

.stat-number {
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
}

.stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 500;
  margin-top: 4px;
}

/* Progress Section */
.progress-section {
  padding: 0 20px;
  margin-top: -14px;
  position: relative;
  z-index: 2;
}

.progress-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-lg);
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--c-text);
}

.progress-percent {
  font-size: 14px;
  font-weight: 800;
  color: var(--c-primary);
}

.progress-bar-bg {
  height: 10px;
  background: var(--c-primary-light);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c-from), var(--c-to), #818cf8);
  background-size: 200% 100%;
  border-radius: 10px;
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  animation: shimmer 2s infinite linear;
  overflow: hidden;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
  animation: shimmerOverlay 2s infinite linear;
}

/* Filter Tabs */
.filter-section {
  padding: 16px 20px 0;
}

.filter-tabs {
  display: flex;
  gap: 8px;
  background: var(--c-card);
  border-radius: 14px;
  padding: 5px;
  box-shadow: var(--shadow);
  position: relative;
}

.filter-tab {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: transparent;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--c-text-secondary);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: inherit;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  position: relative;
  z-index: 1;
}

.filter-tab.active {
  background: var(--c-primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  animation: filterSlide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.filter-tab:not(.active):active {
  background: var(--c-primary-light);
}

.filter-count {
  font-size: 11px;
  font-weight: 700;
  background: rgba(255,255,255,0.25);
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 18px;
  text-align: center;
}

.filter-tab:not(.active) .filter-count {
  background: var(--c-border);
  color: var(--c-text-secondary);
}

/* Add Task */
.add-section {
  padding: 14px 20px 0;
}

.add-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 10px;
  align-items: center;
}

.add-input-wrapper {
  flex: 1;
  position: relative;
}

.add-input {
  width: 100%;
  border: 2px solid var(--c-border);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: inherit;
  color: var(--c-text);
  background: var(--c-bg);
  transition: all var(--transition);
  direction: rtl;
  min-height: 44px;
}

.add-input:focus {
  outline: none;
  border-color: var(--c-primary);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
}

.add-input::placeholder {
  color: var(--c-text-light);
}

.add-btn {
  width: 48px;
  height: 48px;
  border: none;
  background: linear-gradient(135deg, var(--c-from), var(--c-to));
  color: #fff;
  border-radius: 14px;
  font-size: 22px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
}

.add-btn:active {
  transform: scale(0.92);
  box-shadow: 0 1px 4px rgba(37,99,235,0.2);
}

/* Category Selector */
.category-selector {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  padding: 0 4px;
}

.cat-option {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 2px solid var(--c-border);
  background: #fff;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  min-height: 32px;
}

.cat-option.selected {
  border-color: currentColor;
}

.cat-option[data-cat="work"] { color: var(--c-primary); }
.cat-option[data-cat="work"].selected { background: var(--c-primary-light); border-color: var(--c-primary); }
.cat-option[data-cat="personal"] { color: var(--c-success); }
.cat-option[data-cat="personal"].selected { background: var(--c-success-light); border-color: var(--c-success); }
.cat-option[data-cat="shopping"] { color: var(--c-orange); }
.cat-option[data-cat="shopping"].selected { background: var(--c-orange-light); border-color: var(--c-orange); }

/* Priority Selector */
.priority-selector {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  padding: 0 4px;
}

.pri-option {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 2px solid var(--c-border);
  background: #fff;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  min-height: 32px;
}

.pri-option.selected { border-color: currentColor; }
.pri-option[data-pri="high"] { color: var(--c-danger); }
.pri-option[data-pri="high"].selected { background: var(--c-danger-light); border-color: var(--c-danger); }
.pri-option[data-pri="medium"] { color: var(--c-warning); }
.pri-option[data-pri="medium"].selected { background: var(--c-warning-light); border-color: var(--c-warning); }
.pri-option[data-pri="low"] { color: var(--c-success); }
.pri-option[data-pri="low"].selected { background: var(--c-success-light); border-color: var(--c-success); }

/* Task List */
.task-list {
  padding: 14px 20px;
  padding-bottom: 140px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.task-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  touch-action: pan-y;
  cursor: pointer;
}

.task-card.removing {
  animation: slideOut 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.task-card.completed {
  opacity: 0.7;
}

.task-card:active {
  transform: scale(0.985);
}

/* Completion celebration */
.task-card.celebrating {
  position: relative;
}

.celebrate-particle {
  position: absolute;
  pointer-events: none;
  font-size: 14px;
  z-index: 10;
  animation: celebrateStar 0.7s ease-out forwards;
}

/* Task Icon (per category) */
.task-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.task-icon::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: iconPulse 2s ease-in-out infinite;
}

.task-icon span {
  position: relative;
  z-index: 1;
  line-height: 1;
}

.task-icon-work {
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
}

.task-icon-work span {
  animation: iconFloat 3s ease-in-out infinite;
}

.task-icon-personal {
  background: linear-gradient(135deg, #22c55e, #4ade80);
}

.task-icon-personal span {
  animation: iconSpin 8s linear infinite;
}

.task-icon-shopping {
  background: linear-gradient(135deg, #f97316, #fb923c);
}

.task-icon-shopping span {
  animation: iconBounce 2s ease-in-out infinite;
}

.task-card.completed .task-icon {
  opacity: 0.5;
  filter: grayscale(0.4);
}

.task-card.completed .task-icon::after {
  animation: none;
}

.task-card.completed .task-icon span {
  animation: none;
}

/* Custom Checkbox */
.task-checkbox {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2.5px solid var(--c-border);
  flex-shrink: 0;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  position: relative;
  min-width: 44px;
  min-height: 44px;
  background-clip: content-box;
  padding: 9px;
  box-sizing: content-box;
  margin: -9px;
  margin-left: 3px;
}

.task-checkbox::after {
  content: '';
  width: 10px;
  height: 6px;
  border-bottom: 2.5px solid #fff;
  border-left: 2.5px solid #fff;
  border-right: none;
  transform: rotate(45deg) scale(0);
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  margin-top: -2px;
}

.task-checkbox.checked {
  background-color: var(--c-success);
  border-color: var(--c-success);
}

.task-checkbox.checked::after {
  transform: rotate(45deg) scale(1);
}

.task-checkbox.pop {
  animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.task-content {
  flex: 1;
  min-width: 0;
}

.task-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--c-text);
  transition: all var(--transition);
  line-height: 1.4;
}

.task-card.completed .task-title {
  text-decoration: line-through;
  color: var(--c-text-light);
}

.task-meta {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
  align-items: center;
}

/* Category Tags */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}

.tag-work {
  background: var(--c-primary-light);
  color: var(--c-primary);
}

.tag-personal {
  background: var(--c-success-light);
  color: var(--c-success);
}

.tag-shopping {
  background: var(--c-orange-light);
  color: var(--c-orange);
}

/* Priority Badges */
.priority-badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.priority-high {
  background: var(--c-danger-light);
  color: var(--c-danger);
}

.priority-medium {
  background: var(--c-warning-light);
  color: var(--c-warning);
}

.priority-low {
  background: var(--c-success-light);
  color: var(--c-success);
}

/* Delete Button */
.task-delete {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--c-text-light);
  border-radius: 10px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  min-width: 44px;
  min-height: 44px;
  padding: 6px;
  margin: -6px;
  margin-right: -6px;
}

.task-delete:hover, .task-delete:active {
  background: var(--c-danger-light);
  color: var(--c-danger);
}

/* FAB Button */
.fab {
  position: fixed;
  bottom: 84px;
  left: 50%;
  transform: translateX(-50%);
  width: 56px;
  height: 56px;
  border: none;
  background: linear-gradient(135deg, var(--c-from), #818cf8);
  color: #fff;
  border-radius: 50%;
  font-size: 28px;
  font-weight: 300;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(37,99,235,0.4);
  z-index: 100;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 420px;
  animation: fabPulse 2.5s ease-in-out infinite;
}

@media (min-width: 421px) {
  .fab {
    left: calc(50%);
  }
}

.fab:active {
  transform: translateX(-50%) scale(0.9) rotate(90deg);
  animation: none;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: var(--c-card);
  border-top: 1px solid var(--c-border);
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 99;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  min-width: 44px;
  min-height: 44px;
  border-radius: 12px;
  color: var(--c-text-light);
}

.nav-item.active {
  color: var(--c-primary);
}

.nav-item:active {
  background: var(--c-primary-light);
}

.nav-icon {
  font-size: 22px;
  line-height: 1;
}

.nav-label {
  font-size: 10px;
  font-weight: 600;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--c-text-light);
  position: relative;
}

.empty-illustration {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.empty-illustration .empty-main-icon {
  font-size: 52px;
  animation: emptyFloat 3s ease-in-out infinite;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

.empty-illustration .empty-orb {
  position: absolute;
  border-radius: 50%;
  animation: emptyOrb 3s ease-in-out infinite;
}

.empty-illustration .empty-orb-1 {
  width: 24px;
  height: 24px;
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  top: 8px;
  right: 8px;
  animation-delay: 0s;
}

.empty-illustration .empty-orb-2 {
  width: 16px;
  height: 16px;
  background: linear-gradient(135deg, #dcfce7, #bbf7d0);
  bottom: 12px;
  left: 10px;
  animation-delay: 0.5s;
}

.empty-illustration .empty-orb-3 {
  width: 20px;
  height: 20px;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  top: 20px;
  left: 5px;
  animation-delay: 1s;
}

.empty-illustration .empty-orb-4 {
  width: 12px;
  height: 12px;
  background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
  bottom: 20px;
  right: 15px;
  animation-delay: 1.5s;
}

.empty-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--c-text-secondary);
}

.empty-subtext {
  font-size: 13px;
  margin-top: 4px;
}

/* Toast Notification */
.toast {
  position: fixed;
  bottom: 150px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--c-text);
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow-xl);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Swipe delete hint */
.swipe-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--c-danger);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 0 20px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  z-index: -1;
}

/* Scrollbar */
body::-webkit-scrollbar {
  width: 0;
}

/* Animation delay helper */
.task-card:nth-child(1) { animation-delay: 0s; }
.task-card:nth-child(2) { animation-delay: 0.04s; }
.task-card:nth-child(3) { animation-delay: 0.08s; }
.task-card:nth-child(4) { animation-delay: 0.12s; }
.task-card:nth-child(5) { animation-delay: 0.16s; }
.task-card:nth-child(6) { animation-delay: 0.2s; }
.task-card:nth-child(7) { animation-delay: 0.24s; }
.task-card:nth-child(8) { animation-delay: 0.28s; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-orb header-orb-1"></div>
  <div class="header-orb header-orb-2"></div>
  <div class="header-orb header-orb-3"></div>
  <div class="header-orb header-orb-4"></div>
  <div class="header-orb header-orb-5"></div>
  <div class="header-top">
    <div>
      <div class="header-title">TaskMaster</div>
      <div class="header-subtitle">ניהול משימות חכם</div>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">סה"כ</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statCompleted">0</div>
      <div class="stat-label">הושלמו</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statPending">0</div>

<!-- Progress Bar -->
<div class="progress-section">
  <div class="progress-card">
    <div class="progress-header">

      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

</div>

<!-- Filter Tabs -->
<div class="filter-section">
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">

<!-- Add Task -->
<div class="add-section">
  <div class="add-card">
    <div class="add-input-wrapper">
      <input type="text" class="add-input" id="addInput" placeholder="הוסף משימה חדשה..." autocomplete="off">
      <div class="category-selector" id="catSelector">
        <button class="cat-option selected" data-cat="work">עבודה</button>

<!-- Bottom Navigation -->

  <button class="nav-item" data-nav="calendar">
    <span class="nav-icon">&#128197;</span>

  </button>
  <button class="nav-item" data-nav="stats">
    <span class="nav-icon">&#128200;</span>
    <span class="nav-label">סטטיסטיקה</span>
  </button>
  <button class="nav-item" data-nav="settings">
    <span class="nav-icon">&#9881;</span>
    <span class="nav-label">הגדרות</span>
  </button>
</nav>

<script>
(function() {
  'use strict';

  // ── Data ──
  var CATEGORIES = {
    work:     { label: 'עבודה',  class: 'tag-work',     iconClass: 'task-icon-work',     emoji: '💼' },
    personal: { label: 'אישי',   class: 'tag-personal', iconClass: 'task-icon-personal', emoji: '🌟' },
    shopping: { label: 'קניות',  class: 'tag-shopping', iconClass: 'task-icon-shopping', emoji: '🛒' }
  };

  var PRIORITIES = {
    high:   { label: 'גבוה',  class: 'priority-high' },
    medium: { label: 'בינוני', class: 'priority-medium' },
    low:    { label: 'נמוך',   class: 'priority-low' }
  };

  var tasks = [
    { id: 1, title: 'להכין מצגת לפגישת צוות', completed: false, category: 'work', priority: 'high' },
    { id: 2, title: 'לקנות מתנת יום הולדת לדנה', completed: false, category: 'personal', priority: 'medium' },
    { id: 3, title: 'לשלוח דוח חודשי למנהל', completed: true, category: 'work', priority: 'high' },
    { id: 4, title: 'חלב, ביצים, לחם, גבינה', completed: false, category: 'shopping', priority: 'low' },
    { id: 5, title: 'לתאם פגישה עם לקוח חדש', completed: false, category: 'work', priority: 'medium' },
    { id: 6, title: 'לסיים קורס אונליין - פרק 5', completed: true, category: 'personal', priority: 'medium' },
    { id: 7, title: 'לעדכן קורות חיים', completed: true, category: 'personal', priority: 'low' },
    { id: 8, title: 'להזמין מסעדה לערב שישי', completed: false, category: 'personal', priority: 'medium' }
  ];

  var nextId = 9;
  var currentFilter = 'all';
  var selectedCategory = 'work';
  var selectedPriority = 'medium';

  // ── DOM Refs ──
  var taskListEl    = document.getElementById('taskList');
  var addInputEl    = document.getElementById('addInput');
  var addBtnEl      = document.getElementById('addBtn');
  var fabEl         = document.getElementById('fabBtn');
  var toastEl       = document.getElementById('toast');
  var headerDateEl  = document.getElementById('headerDate');
  var progressBar   = document.getElementById('progressBar');
  var progressPct   = document.getElementById('progressPercent');
  var statTotal     = document.getElementById('statTotal');
  var statCompleted = document.getElementById('statCompleted');
  var statPending   = document.getElementById('statPending');
  var countAll      = document.getElementById('countAll');
  var countActive   = document.getElementById('countActive');
  var countCompleted= document.getElementById('countCompleted');

  // ── Set Date ──
  function setDate() {
    var now = new Date();
    var days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    var months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    headerDateEl.textContent = 'יום ' + days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()];
  }
  setDate();

  // ── Toast ──
  var toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
  }

  // ── Stats ──
  function updateStats() {
    var total = tasks.length;
    var done = tasks.filter(function(t) { return t.completed; }).length;
    var pending = total - done;
    var pct = total === 0 ? 0 : Math.round((done / total) * 100);

    statTotal.textContent = total;
    statCompleted.textContent = done;
    statPending.textContent = pending;
    progressPct.textContent = pct + '%';
    progressBar.style.width = pct + '%';

    countAll.textContent = total;
    countActive.textContent = pending;
    countCompleted.textContent = done;
  }

  // ── Filter ──
  function getFilteredTasks() {
    if (currentFilter === 'active') {
      return tasks.filter(function(t) { return !t.completed; });
    }
    if (currentFilter === 'completed') {
      return tasks.filter(function(t) { return t.completed; });
    }
    return tasks.slice();
  }

  // ── Celebration particles ──
  function spawnCelebration(card) {
    var particles = ['✨', '⭐', '✅', '🎉', '❤️'];
    var rect = card.getBoundingClientRect();
    var cardRect = { width: card.offsetWidth, height: card.offsetHeight };

    for (var i = 0; i < 6; i++) {
      var particle = document.createElement('span');
      particle.className = 'celebrate-particle';
      particle.textContent = particles[Math.floor(Math.random() * particles.length)];
      particle.style.left = (Math.random() * cardRect.width * 0.6 + cardRect.width * 0.2) + 'px';
      particle.style.top = (Math.random() * cardRect.height * 0.6 + cardRect.height * 0.2) + 'px';
      particle.style.animationDelay = (i * 0.08) + 's';
      card.appendChild(particle);
    }

    card.classList.add('celebrating');
    setTimeout(function() {
      card.classList.remove('celebrating');
      var leftover = card.querySelectorAll('.celebrate-particle');
      for (var j = 0; j < leftover.length; j++) {
        leftover[j].remove();
      }
    }, 800);
  }

  // ── Render ──
  function renderTasks() {
    var filtered = getFilteredTasks();
    taskListEl.innerHTML = '';

    if (filtered.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';

      var mainEmoji = currentFilter === 'completed' ? '🏆' : (currentFilter === 'active' ? '🎉' : '📋');
      var text = currentFilter === 'completed' ? 'אין משימות שהושלמו' : (currentFilter === 'active' ? 'כל המשימות הושלמו!' : 'אין משימות עדיין');
      var sub = currentFilter === 'active' ? 'כל הכבוד! סיימת הכל' : 'לחץ על + כדי להוסיף משימה';

      empty.innerHTML =
        '<div class="empty-illustration">' +
          '<span class="empty-main-icon">' + mainEmoji + '</span>' +
          '<div class="empty-orb empty-orb-1"></div>' +
          '<div class="empty-orb empty-orb-2"></div>' +
          '<div class="empty-orb empty-orb-3"></div>' +
          '<div class="empty-orb empty-orb-4"></div>' +
        '</div>' +
        '<div class="empty-text">' + text + '</div>' +
        '<div class="empty-subtext">' + sub + '</div>';
      taskListEl.appendChild(empty);
      updateStats();
      return;
    }

    filtered.forEach(function(task, i) {
      var card = document.createElement('div');
      card.className = 'task-card' + (task.completed ? ' completed' : '');
      card.dataset.id = task.id;
      card.style.animationDelay = (i * 0.04) + 's';

      var cat = CATEGORIES[task.category] || CATEGORIES.work;
      var pri = PRIORITIES[task.priority] || PRIORITIES.medium;

      card.innerHTML =
        '<div class="task-checkbox' + (task.completed ? ' checked' : '') + '" data-action="toggle"></div>' +
        '<div class="task-content" data-action="toggle">' +
          '<div class="task-title">' + escapeHtml(task.title) + '</div>' +
          '<div class="task-meta">' +
            '<span class="tag ' + cat.class + '">' + cat.label + '</span>' +
            '<span class="priority-badge ' + pri.class + '">' + pri.label + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="task-icon ' + cat.iconClass + '">' +
          '<span>' + cat.emoji + '</span>' +
        '</div>' +
        '<button class="task-delete" data-action="delete" aria-label="מחק משימה">&times;</button>';

      taskListEl.appendChild(card);
    });

    updateStats();
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ── Task Actions ──
  function toggleTask(id) {
    var task = tasks.find(function(t) { return t.id === id; });
    if (!task) return;
    task.completed = !task.completed;

    var card = taskListEl.querySelector('[data-id="' + id + '"]');
    if (card) {
      var cb = card.querySelector('.task-checkbox');
      cb.classList.add('pop');
      setTimeout(function() { cb.classList.remove('pop'); }, 300);

      // Spawn celebration particles when completing
      if (task.completed) {
        spawnCelebration(card);
      }
    }

    if (task.completed) {
      showToast('משימה הושלמה! ✓');
    } else {
      showToast('המשימה חזרה לפעילות');
    }

    setTimeout(function() { renderTasks(); }, 200);
  }

  function deleteTask(id) {
    var card = taskListEl.querySelector('[data-id="' + id + '"]');
    if (card) {
      card.classList.add('removing');
      setTimeout(function() {
        tasks = tasks.filter(function(t) { return t.id !== id; });
        renderTasks();
        showToast('המשימה נמחקה');
      }, 350);
    } else {
      tasks = tasks.filter(function(t) { return t.id !== id; });
      renderTasks();
    }
  }

  function addTask() {
    var title = addInputEl.value.trim();
    if (!title) {
      addInputEl.focus();
      addInputEl.style.borderColor = 'var(--c-danger)';
      setTimeout(function() { addInputEl.style.borderColor = ''; }, 1000);
      return;
    }

    var task = {
      id: nextId++,
      title: title,
      completed: false,
      category: selectedCategory,
      priority: selectedPriority
    };

    tasks.unshift(task);
    addInputEl.value = '';
    renderTasks();
    showToast('משימה חדשה נוספה!');

    // Scroll to top of task list
    taskListEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Event Listeners ──

  // Task list click delegation
  taskListEl.addEventListener('click', function(e) {
    var target = e.target;
    while (target && target !== taskListEl) {
      var action = target.dataset.action;
      if (action) {
        var card = target.closest('.task-card');
        if (card) {
          var id = parseInt(card.dataset.id, 10);
          if (action === 'toggle') {
            toggleTask(id);
          } else if (action === 'delete') {
            e.stopPropagation();
            deleteTask(id);
          }
        }
        return;
      }
      target = target.parentElement;
    }
  });

  // Add button
  addBtnEl.addEventListener('click', function(e) {
    e.preventDefault();
    addTask();
  });

  // Enter key
  addInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTask();
    }
  });

  // FAB
  fabEl.addEventListener('click', function() {
    addInputEl.focus();
    addInputEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderTasks();
    });
  });

  // Category selector
  document.querySelectorAll('.cat-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.cat-option').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedCategory = btn.dataset.cat;
    });
  });

  // Priority selector
  document.querySelectorAll('.pri-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.pri-option').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedPriority = btn.dataset.pri;
    });
  });

  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });
      item.classList.add('active');
      if (item.dataset.nav !== 'tasks') {
        showToast('בקרוב: ' + item.querySelector('.nav-label').textContent);
      }
    });
  });

  // ── Swipe to delete ──
  (function initSwipe() {
    var startX = 0, startY = 0, currentCard = null, isDragging = false, hasMoved = false;

    taskListEl.addEventListener('touchstart', function(e) {
      var card = e.target.closest('.task-card');
      if (!card) return;
      // Don't intercept delete button
      if (e.target.closest('.task-delete')) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      currentCard = card;
      isDragging = false;
      hasMoved = false;
    }, { passive: true });

    taskListEl.addEventListener('touchmove', function(e) {
      if (!currentCard) return;
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;

      if (!isDragging) {
        // Determine if horizontal or vertical swipe
        if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          isDragging = true;
          hasMoved = true;
        } else if (Math.abs(dy) > 10) {
          currentCard = null;
          return;
        }
      }

      if (isDragging) {
        // In RTL, swipe left (negative dx) means swipe toward start
        var offset = dx;
        // Only allow swiping to the left (for delete in RTL)
        if (offset > 0) offset = 0;
        currentCard.style.transform = 'translateX(' + offset + 'px)';
        currentCard.style.transition = 'none';
        e.preventDefault();
      }
    }, { passive: false });

    taskListEl.addEventListener('touchend', function() {
      if (!currentCard) return;
      if (isDragging) {
        var transform = currentCard.style.transform;
        var match = transform.match(/translateX\((-?\d+(\.\d+)?)px\)/);
        var offset = match ? parseFloat(match[1]) : 0;

        currentCard.style.transition = '';

        if (offset < -100) {
          // Delete threshold reached
          var id = parseInt(currentCard.dataset.id, 10);
          deleteTask(id);
        } else {
          currentCard.style.transform = '';
        }
      }
      currentCard = null;
      isDragging = false;
    }, { passive: true });
  })();

  // ── Initial Render ──
  renderTasks();

})();
</script>
