<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fafafa">
<meta name="application-name" content="TaskMaster">
<meta name="apple-mobile-web-app-title" content="TaskMaster">
<meta name="description" content="TaskMaster - ניהול משימות">
<meta name="format-detection" content="telephone=no">
<title>TaskMaster</title>
<style>
:root {
  --bg: #fafafa;
  --bg-card: #ffffff;
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #007AFF;
  --separator: #f0f0f0;
  --nav-bg: rgba(250,250,250,0.92);
  --checkbox-border: #d1d1d6;
  --tag-bg: #f2f2f7;
  --tag-text: #86868b;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-card: #000000;
    --text-primary: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #636366;
    --accent: #0A84FF;
    --separator: #1c1c1e;
    --nav-bg: rgba(0,0,0,0.92);
    --checkbox-border: #48484a;
    --tag-bg: #1c1c1e;
    --tag-text: #98989d;
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  direction: rtl;
  max-width: 420px;
  margin: 0 auto;
  position: relative;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

body::-webkit-scrollbar { width: 0; }

/* Header */
.header {
  padding: 16px 20px 0;
  background: var(--bg);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header-right {
  flex: 1;
}

.header-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}

.header-date {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-top: 2px;
}

.header-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 4px;
}

.header-avatar svg {
  width: 18px;
  height: 18px;
  fill: #fff;
}

/* Stats */
.stats-row {
  display: flex;
  gap: 0;
  padding: 20px 20px 0;
}

.stat-item {
  flex: 1;
  text-align: center;
}

.stat-item:not(:last-child) {
  border-left: 1px solid var(--separator);
}

.stat-number {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.1;
  letter-spacing: -0.5px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-top: 4px;
  letter-spacing: 0.1px;
}

/* Progress */
.progress-section {
  padding: 18px 20px 0;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.progress-percent {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.progress-bar-bg {
  height: 4px;
  background: var(--separator);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Filter Tabs */
.filter-section {
  padding: 20px 20px 0;
}

.filter-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--separator);
}

.filter-tab {
  flex: 1;
  padding: 10px 0;
  border: none;
  background: transparent;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-tertiary);
  cursor: pointer;
  font-family: inherit;
  position: relative;
  transition: color 0.2s ease;
}

.filter-tab.active {
  color: var(--accent);
  font-weight: 600;
}

.filter-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  right: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  border-radius: 1px 1px 0 0;
}

.filter-tab:not(.active):active {
  color: var(--text-secondary);
}

/* Task List */
.task-list {
  padding: 8px 20px;
  padding-bottom: 140px;
}

/* Task Item */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--separator);
  transition: opacity 0.2s ease;
}

.task-item:last-child {
  border-bottom: none;
}

/* Checkbox */
.task-checkbox {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  cursor: pointer;
  margin-top: 1px;
  position: relative;
}

.task-checkbox svg {
  width: 22px;
  height: 22px;
}

.task-checkbox .cb-circle {
  fill: none;
  stroke: var(--checkbox-border);
  stroke-width: 1.5;
}

.task-checkbox .cb-fill {
  fill: var(--accent);
  stroke: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.task-checkbox .cb-check {
  stroke: #fff;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.task-checkbox.checked .cb-fill {
  opacity: 1;
}

.task-checkbox.checked .cb-check {
  opacity: 1;
}

.task-checkbox.checked .cb-circle {
  stroke: var(--accent);
}

/* Task Content */
.task-content {
  flex: 1;
  min-width: 0;
  cursor: pointer;
}

.task-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.4;
  transition: color 0.2s ease;
}

.task-item.completed .task-title {
  text-decoration: line-through;
  color: var(--text-tertiary);
}

.task-item.completed {
  opacity: 0.7;
}

.task-meta {
  display: flex;
  gap: 8px;
  margin-top: 4px;
  align-items: center;
}

.task-category {
  font-size: 12px;
  font-weight: 500;
  color: var(--tag-text);
  background: var(--tag-bg);
  padding: 1px 8px;
  border-radius: 4px;
}

.task-due {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 80px;
  left: 24px;
  width: 50px;
  height: 50px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-size: 26px;
  font-weight: 300;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,122,255,0.3);
  transition: transform 0.15s ease;
}

@media (prefers-color-scheme: dark) {
  .fab {
    box-shadow: 0 2px 8px rgba(10,132,255,0.4);
  }
}

.fab:active {
  transform: scale(0.92);
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--separator);
  padding: 6px 0;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 99;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-tertiary);
  transition: color 0.15s ease;
}

.nav-item.active {
  color: var(--accent);
}

.nav-item:active {
  opacity: 0.6;
}

.nav-icon {
  width: 24px;
  height: 24px;
}

.nav-icon svg {
  width: 24px;
  height: 24px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-label {
  font-size: 10px;
  font-weight: 500;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}

.empty-text {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-secondary);
}

.empty-subtext {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--text-primary);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  z-index: 200;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <div class="header-right">
      <div class="header-title">TaskMaster</div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="header-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
  </div>
</header>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-item">
    <div class="stat-number" id="statTotal">0</div>
    <div class="stat-label">סה"כ</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statCompleted">0</div>
    <div class="stat-label">הושלמו</div>
  </div>
  <div class="stat-item">
    <div class="stat-number" id="statPending">0</div>
    <div class="stat-label">נותרו</div>
  </div>
</div>

<!-- Progress -->
<div class="progress-section">
  <div class="progress-header">
    <span class="progress-title">התקדמות</span>
    <span class="progress-percent" id="progressPercent">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>
</div>

<!-- Filter Tabs -->
<div class="filter-section">
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all">הכל</button>
    <button class="filter-tab" data-filter="active">פעילות</button>
    <button class="filter-tab" data-filter="completed">הושלמו</button>
  </div>
</div>

<!-- Task List -->
<div class="task-list" id="taskList"></div>

<!-- FAB -->
<button class="fab" id="fabBtn" aria-label="משימה חדשה">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="11" y1="3" x2="11" y2="19"/><line x1="3" y1="11" x2="19" y2="11"/></svg>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-item active" data-nav="tasks">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 5h11M9 12h11M9 19h11"/><circle cx="4.5" cy="5" r="1"/><circle cx="4.5" cy="12" r="1"/><circle cx="4.5" cy="19" r="1"/></svg></span>
    <span class="nav-label">משימות</span>
  </button>
  <button class="nav-item" data-nav="calendar">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    <span class="nav-label">לוח שנה</span>
  </button>
  <button class="nav-item" data-nav="search">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></span>
    <span class="nav-label">חיפוש</span>
  </button>
  <button class="nav-item" data-nav="settings">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
    <span class="nav-label">הגדרות</span>
  </button>
</nav>

<script>
(function() {
  'use strict';

  var CATEGORIES = {
    work:     { label: 'עבודה' },
    personal: { label: 'אישי' },
    home:     { label: 'בית' },
    shopping: { label: 'קניות' }
  };

  var tasks = [
    { id: 1,  title: 'להכין מצגת לפגישת צוות',       completed: false, category: 'work',     due: 'היום' },
    { id: 2,  title: 'לשלוח דוח חודשי למנהל',         completed: true,  category: 'work',     due: null },
    { id: 3,  title: 'לקנות מתנת יום הולדת לדנה',     completed: false, category: 'personal', due: 'מחר' },
    { id: 4,  title: 'לתאם פגישה עם לקוח חדש',        completed: false, category: 'work',     due: 'יום רביעי' },
    { id: 5,  title: 'חלב, ביצים, לחם, גבינה',         completed: false, category: 'shopping', due: 'היום' },
    { id: 6,  title: 'לתקן את הברז במטבח',             completed: true,  category: 'home',     due: null },
    { id: 7,  title: 'לסיים קורס אונליין - פרק 5',    completed: true,  category: 'personal', due: null },
    { id: 8,  title: 'לעדכן קורות חיים',               completed: false, category: 'personal', due: 'השבוע' },
    { id: 9,  title: 'להזמין מסעדה לערב שישי',         completed: false, category: 'personal', due: 'יום חמישי' },
    { id: 10, title: 'לסדר את הארון בחדר שינה',        completed: true,  category: 'home',     due: null }
  ];

  var nextId = 11;
  var currentFilter = 'all';

  var taskListEl    = document.getElementById('taskList');
  var toastEl       = document.getElementById('toast');
  var headerDateEl  = document.getElementById('headerDate');
  var progressBar   = document.getElementById('progressBar');
  var progressPct   = document.getElementById('progressPercent');
  var statTotal     = document.getElementById('statTotal');
  var statCompleted = document.getElementById('statCompleted');
  var statPending   = document.getElementById('statPending');
  var fabEl         = document.getElementById('fabBtn');

  function setDate() {
    var now = new Date();
    var days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    var months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    headerDateEl.textContent = 'יום ' + days[now.getDay()] + ', ' + now.getDate() + ' ב' + months[now.getMonth()];
  }
  setDate();

  var toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
  }

  function updateStats() {
    var total = tasks.length;
    var done = tasks.filter(function(t) { return t.completed; }).length;
    var pending = total - done;
    var pct = total === 0 ? 0 : Math.round((done / total) * 100);

    statTotal.textContent = total;
    statCompleted.textContent = done;
    statPending.textContent = pending;
    progressPct.textContent = pct + '%';
    progressBar.style.width = pct + '%';
  }

  function getFilteredTasks() {
    if (currentFilter === 'active') {
      return tasks.filter(function(t) { return !t.completed; });
    }
    if (currentFilter === 'completed') {
      return tasks.filter(function(t) { return t.completed; });
    }
    return tasks.slice();
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function createCheckboxSVG(checked) {
    if (checked) {
      return '<svg viewBox="0 0 22 22">' +
        '<circle class="cb-fill" cx="11" cy="11" r="10" opacity="1"/>' +
        '<circle class="cb-circle" cx="11" cy="11" r="10" stroke="var(--accent)"/>' +
        '<polyline class="cb-check" points="6.5,11 9.5,14 15.5,8" opacity="1"/>' +
        '</svg>';
    }
    return '<svg viewBox="0 0 22 22">' +
      '<circle class="cb-fill" cx="11" cy="11" r="10"/>' +
      '<circle class="cb-circle" cx="11" cy="11" r="10"/>' +
      '<polyline class="cb-check" points="6.5,11 9.5,14 15.5,8"/>' +
      '</svg>';
  }

  function renderTasks() {
    var filtered = getFilteredTasks();
    taskListEl.innerHTML = '';

    if (filtered.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      var text, sub;
      if (currentFilter === 'completed') {
        text = 'אין משימות שהושלמו';
        sub = '';
      } else if (currentFilter === 'active') {
        text = 'כל המשימות הושלמו';
        sub = 'כל הכבוד!';
      } else {
        text = 'אין משימות';
        sub = 'לחץ + כדי להוסיף';
      }
      empty.innerHTML = '<div class="empty-text">' + text + '</div>' +
        (sub ? '<div class="empty-subtext">' + sub + '</div>' : '');
      taskListEl.appendChild(empty);
      updateStats();
      return;
    }

    filtered.forEach(function(task) {
      var item = document.createElement('div');
      item.className = 'task-item' + (task.completed ? ' completed' : '');
      item.dataset.id = task.id;

      var cat = CATEGORIES[task.category] || CATEGORIES.work;
      var metaHtml = '<span class="task-category">' + cat.label + '</span>';
      if (task.due && !task.completed) {
        metaHtml += '<span class="task-due">' + escapeHtml(task.due) + '</span>';
      }

      item.innerHTML =
        '<div class="task-checkbox' + (task.completed ? ' checked' : '') + '" data-action="toggle">' +
          createCheckboxSVG(task.completed) +
        '</div>' +
        '<div class="task-content" data-action="toggle">' +
          '<div class="task-title">' + escapeHtml(task.title) + '</div>' +
          '<div class="task-meta">' + metaHtml + '</div>' +
        '</div>';

      taskListEl.appendChild(item);
    });

    updateStats();
  }

  function toggleTask(id) {
    var task = tasks.find(function(t) { return t.id === id; });
    if (!task) return;
    task.completed = !task.completed;

    if (task.completed) {
      showToast('המשימה הושלמה');
    } else {
      showToast('המשימה חזרה לפעילות');
    }

    renderTasks();
  }

  // Task list delegation
  taskListEl.addEventListener('click', function(e) {
    var target = e.target;
    while (target && target !== taskListEl) {
      var action = target.dataset ? target.dataset.action : null;
      if (action === 'toggle') {
        var item = target.closest('.task-item');
        if (item) {
          toggleTask(parseInt(item.dataset.id, 10));
        }
        return;
      }
      target = target.parentElement;
    }
  });

  // FAB - show a prompt to add task
  fabEl.addEventListener('click', function() {
    var title = prompt('משימה חדשה:');
    if (title && title.trim()) {
      tasks.unshift({
        id: nextId++,
        title: title.trim(),
        completed: false,
        category: 'personal',
        due: null
      });
      renderTasks();
      showToast('משימה נוספה');
    }
  });

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderTasks();
    });
  });

  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });
      item.classList.add('active');
      if (item.dataset.nav !== 'tasks') {
        showToast(item.querySelector('.nav-label').textContent);
      }
    });
  });

  // Initial render
  renderTasks();
})();
</script>
</body>
</html>
