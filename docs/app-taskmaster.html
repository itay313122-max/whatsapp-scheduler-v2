<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb">
<meta name="application-name" content="TaskMaster">
<meta name="apple-mobile-web-app-title" content="TaskMaster">
<meta name="description" content="TaskMaster - ניהול משימות חכם">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="data:application/json,{}">
<title>TaskMaster - ניהול משימות</title>
<style>
/* ── CSS Variables & Theme ── */
:root {
  --c-from: #2563eb;
  --c-to: #3b82f6;
  --c-primary: #2563eb;
  --c-primary-light: #dbeafe;
  --c-primary-dark: #1d4ed8;
  --c-accent: #818cf8;
  --c-bg: #f0f4ff;
  --c-bg-elevated: #ffffff;
  --c-card: #ffffff;
  --c-card-hover: #f8fafc;
  --c-text: #1e293b;
  --c-text-secondary: #64748b;
  --c-text-light: #94a3b8;
  --c-border: #e2e8f0;
  --c-success: #22c55e;
  --c-success-light: #dcfce7;
  --c-warning: #f59e0b;
  --c-warning-light: #fef3c7;
  --c-danger: #ef4444;
  --c-danger-light: #fee2e2;
  --c-orange: #f97316;
  --c-orange-light: #fff7ed;
  --c-glass-bg: rgba(255,255,255,0.12);
  --c-glass-border: rgba(255,255,255,0.18);
  --c-glass-card-bg: rgba(255,255,255,0.72);
  --c-glass-card-border: rgba(255,255,255,0.5);
  --c-nav-bg: rgba(255,255,255,0.78);
  --c-nav-border: rgba(255,255,255,0.5);
  --c-filter-bg: rgba(255,255,255,0.65);
  --c-shimmer: rgba(255,255,255,0.4);
  --c-glow-number: rgba(37,99,235,0.5);
  --c-input-bg: #f0f4ff;
  --c-input-focus-bg: #ffffff;
  --c-toast-bg: #1e293b;
  --c-toast-text: #ffffff;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 6px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.06);
  --shadow-xl: 0 8px 24px rgba(0,0,0,0.08), 0 24px 48px rgba(0,0,0,0.06);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --c-from: #3b82f6;
    --c-to: #60a5fa;
    --c-primary: #60a5fa;
    --c-primary-light: rgba(59,130,246,0.15);
    --c-primary-dark: #3b82f6;
    --c-accent: #a5b4fc;
    --c-bg: #0f172a;
    --c-bg-elevated: #1e293b;
    --c-card: #1e293b;
    --c-card-hover: #253348;
    --c-text: #f1f5f9;
    --c-text-secondary: #94a3b8;
    --c-text-light: #64748b;
    --c-border: rgba(148,163,184,0.12);
    --c-success: #4ade80;
    --c-success-light: rgba(74,222,128,0.12);
    --c-warning: #fbbf24;
    --c-warning-light: rgba(251,191,36,0.12);
    --c-danger: #f87171;
    --c-danger-light: rgba(248,113,113,0.12);
    --c-orange: #fb923c;
    --c-orange-light: rgba(251,146,60,0.12);
    --c-glass-bg: rgba(255,255,255,0.06);
    --c-glass-border: rgba(255,255,255,0.1);
    --c-glass-card-bg: rgba(30,41,59,0.72);
    --c-glass-card-border: rgba(148,163,184,0.12);
    --c-nav-bg: rgba(15,23,42,0.82);
    --c-nav-border: rgba(148,163,184,0.1);
    --c-filter-bg: rgba(30,41,59,0.65);
    --c-shimmer: rgba(255,255,255,0.12);
    --c-glow-number: rgba(96,165,250,0.6);
    --c-input-bg: rgba(15,23,42,0.6);
    --c-input-focus-bg: #0f172a;
    --c-toast-bg: #f1f5f9;
    --c-toast-text: #0f172a;
  }
}

/* ── Reset ── */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.6;
  direction: rtl;
  max-width: 420px;
  margin: 0 auto;
  position: relative;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

body::-webkit-scrollbar { width: 0; }

/* ── Keyframes ── */
@keyframes springIn {
  0% { opacity: 0; transform: translateX(40px) scale(0.92); }
  60% { opacity: 1; transform: translateX(-6px) scale(1.02); }
  80% { transform: translateX(2px) scale(0.99); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes springInFromRight {
  0% { opacity: 0; transform: translateX(80px) scale(0.88); }
  50% { opacity: 1; transform: translateX(-10px) scale(1.03); }
  70% { transform: translateX(4px) scale(0.99); }
  100% { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes slideOutLeft {
  0% { opacity: 1; transform: translateX(0) scale(1); }
  30% { transform: translateX(12px) scale(1.01); }
  100% { opacity: 0; transform: translateX(-120px) scale(0.85); max-height: 0; padding: 0; margin: 0; overflow: hidden; }
}

@keyframes checkSpring {
  0% { transform: scale(1); }
  40% { transform: scale(1.25); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

@keyframes confettiBurst {
  0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
  70% { opacity: 0.8; }
  100% { opacity: 0; }
}

@keyframes shimmerSlide {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

@keyframes glowPulse {
  0%, 100% { text-shadow: 0 0 8px var(--c-glow-number); }
  50% { text-shadow: 0 0 20px var(--c-glow-number); }
}

@keyframes fabGlow {
  0%, 100% { box-shadow: 0 4px 20px rgba(37,99,235,0.4), 0 0 0 0 rgba(129,140,248,0); }
  50% { box-shadow: 0 4px 28px rgba(37,99,235,0.55), 0 0 40px 4px rgba(129,140,248,0.2); }
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.85; }
}

@keyframes iconBounce {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-4px); }
  50% { transform: translateY(0); }
  75% { transform: translateY(-2px); }
}

@keyframes orbDrift1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(18px, -12px) scale(1.06); }
  66% { transform: translate(-12px, 10px) scale(0.94); }
}

@keyframes orbDrift2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-14px, 14px) scale(1.1); }
  66% { transform: translate(10px, -16px) scale(0.9); }
}

@keyframes orbDrift3 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(12px, 12px) scale(1.12); }
}

@keyframes filterIndicatorSlide {
  0% { transform: scaleX(0.5); opacity: 0.5; }
  60% { transform: scaleX(1.06); }
  100% { transform: scaleX(1); opacity: 1; }
}

@keyframes emptyFloat {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-14px) rotate(2deg); }
}

@keyframes emptyOrb {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.25); opacity: 0.7; }
}

@keyframes statCardGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 16px 2px rgba(255,255,255,0.12); }
}

/* ── Glass Mixin Classes ── */
.glass {
  background: var(--c-glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--c-glass-border);
  border-radius: 20px;
}

.glass-card {
  background: var(--c-glass-card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--c-glass-card-border);
  border-radius: var(--radius);
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--c-from) 0%, var(--c-to) 45%, var(--c-accent) 100%);
  padding: 22px 20px 34px;
  position: relative;
  overflow: hidden;
}

.header-orb {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.header-orb-1 {
  top: -35px; left: -35px;
  width: 130px; height: 130px;
  background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.02) 70%);
  animation: orbDrift1 9s ease-in-out infinite;
}

.header-orb-2 {
  bottom: -30px; right: 15px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.01) 70%);
  animation: orbDrift2 11s ease-in-out infinite;
}

.header-orb-3 {
  top: 18px; right: 38%;
  width: 55px; height: 55px;
  background: radial-gradient(circle, rgba(255,255,255,0.09) 0%, transparent 70%);
  animation: orbDrift3 7s ease-in-out infinite;
}

.header-orb-4 {
  bottom: 35px; left: 28%;
  width: 38px; height: 38px;
  background: radial-gradient(circle, rgba(255,255,255,0.11) 0%, transparent 70%);
  animation: orbDrift1 8s ease-in-out infinite reverse;
}

.header-orb-5 {
  top: 45px; left: 68%;
  width: 28px; height: 28px;
  background: radial-gradient(circle, rgba(255,255,255,0.13) 0%, transparent 70%);
  animation: orbDrift2 10s ease-in-out infinite;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}

.header-title {
  color: #fff;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.header-subtitle {
  color: rgba(255,255,255,0.82);
  font-size: 13px;
  font-weight: 500;
  margin-top: 2px;
}

.header-date {
  color: rgba(255,255,255,0.92);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 24px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.18);
}

/* ── Stat Cards (Glass over header) ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  position: relative;
  z-index: 1;
}

.stat-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 16px 8px;
  text-align: center;
  transition: transform 0.2s var(--spring);
  animation: statCardGlow 4s ease-in-out infinite;
}

.stat-card:nth-child(2) { animation-delay: 1.3s; }
.stat-card:nth-child(3) { animation-delay: 2.6s; }

.stat-card:active { transform: scale(0.95); }

.stat-number {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  animation: glowPulse 3s ease-in-out infinite;
  --c-glow-number: rgba(255,255,255,0.35);
}

.stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: 0.2px;
}

/* ── Progress Card (Glass, overlapping header) ── */
.progress-section {
  padding: 0 20px;
  margin-top: -14px;
  position: relative;
  z-index: 2;
}

.progress-card {
  background: var(--c-glass-card-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--c-glass-card-border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-lg);
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--c-text);
}

.progress-percent {
  font-size: 14px;
  font-weight: 800;
  color: var(--c-primary);
}

.progress-bar-bg {
  height: 10px;
  background: var(--c-primary-light);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c-from), var(--c-to), var(--c-accent));
  background-size: 200% 100%;
  border-radius: 10px;
  transition: width 0.8s var(--spring);
  position: relative;
  overflow: hidden;
}

/* Shimmer overlay on progress bar */
.progress-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent 0%, var(--c-shimmer) 50%, transparent 100%);
  animation: shimmerSlide 2s infinite linear;
}

/* ── Filter Tabs (Glass container) ── */
.filter-section {
  padding: 16px 20px 0;
}

.filter-tabs {
  display: flex;
  gap: 0;
  background: var(--c-filter-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--c-glass-card-border);
  border-radius: 16px;
  padding: 4px;
  position: relative;
  box-shadow: var(--shadow);
}

.filter-indicator {
  position: absolute;
  top: 4px;
  height: calc(100% - 8px);
  background: var(--c-primary);
  border-radius: 12px;
  transition: all 0.45s var(--spring);
  box-shadow: 0 2px 12px rgba(37,99,235,0.35);
  z-index: 0;
  animation: filterIndicatorSlide 0.4s var(--spring);
}

.filter-tab {
  flex: 1;
  padding: 10px 6px;
  border: none;
  background: transparent;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--c-text-secondary);
  cursor: pointer;
  transition: color 0.3s ease;
  font-family: inherit;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  position: relative;
  z-index: 1;
}

.filter-tab.active {
  color: #fff;
}

.filter-tab:not(.active):active {
  background: var(--c-primary-light);
  border-radius: 12px;
}

.filter-count {
  font-size: 11px;
  font-weight: 700;
  background: rgba(255,255,255,0.25);
  padding: 1px 7px;
  border-radius: 8px;
  min-width: 18px;
  text-align: center;
}

.filter-tab:not(.active) .filter-count {
  background: var(--c-border);
  color: var(--c-text-secondary);
}

/* ── Add Task Section ── */
.add-section {
  padding: 14px 20px 0;
}

.add-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 10px;
  align-items: center;
  border: 1px solid var(--c-border);
}

.add-input-wrapper {
  flex: 1;
  position: relative;
}

.add-input {
  width: 100%;
  border: 2px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 14px;
  font-family: inherit;
  color: var(--c-text);
  background: var(--c-input-bg);
  transition: all var(--transition);
  direction: rtl;
  min-height: 44px;
}

.add-input:focus {
  outline: none;
  border-color: var(--c-primary);
  background: var(--c-input-focus-bg);
  box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
}

.add-input::placeholder {
  color: var(--c-text-light);
}

.add-btn {
  width: 48px;
  height: 48px;
  border: none;
  background: linear-gradient(135deg, var(--c-from), var(--c-accent));
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 24px;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.2s var(--spring);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(37,99,235,0.35);
}

.add-btn:active {
  transform: scale(0.88);
}

/* ── Category / Priority Selectors ── */
.category-selector {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  padding: 0 2px;
}

.cat-option {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 2px solid var(--c-border);
  background: var(--c-card);
  cursor: pointer;
  transition: all 0.2s var(--spring);
  font-family: inherit;
  min-height: 32px;
  color: var(--c-text-secondary);
}

.cat-option.selected { border-color: currentColor; }
.cat-option[data-cat="work"] { color: var(--c-primary); }
.cat-option[data-cat="work"].selected { background: var(--c-primary-light); border-color: var(--c-primary); }
.cat-option[data-cat="personal"] { color: var(--c-success); }
.cat-option[data-cat="personal"].selected { background: var(--c-success-light); border-color: var(--c-success); }
.cat-option[data-cat="shopping"] { color: var(--c-orange); }
.cat-option[data-cat="shopping"].selected { background: var(--c-orange-light); border-color: var(--c-orange); }

.priority-selector {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  padding: 0 2px;
}

.pri-option {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 2px solid var(--c-border);
  background: var(--c-card);
  cursor: pointer;
  transition: all 0.2s var(--spring);
  font-family: inherit;
  min-height: 32px;
  color: var(--c-text-secondary);
}

.pri-option.selected { border-color: currentColor; }
.pri-option[data-pri="high"] { color: var(--c-danger); }
.pri-option[data-pri="high"].selected { background: var(--c-danger-light); border-color: var(--c-danger); }
.pri-option[data-pri="medium"] { color: var(--c-warning); }
.pri-option[data-pri="medium"].selected { background: var(--c-warning-light); border-color: var(--c-warning); }
.pri-option[data-pri="low"] { color: var(--c-success); }
.pri-option[data-pri="low"].selected { background: var(--c-success-light); border-color: var(--c-success); }

/* ── Task List ── */
.task-list {
  padding: 14px 20px;
  padding-bottom: 150px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Task Card ── */
.task-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: transform 0.2s ease, opacity 0.2s ease;
  position: relative;
  overflow: hidden;
  animation: springIn 0.55s var(--spring) both;
  touch-action: pan-y;
  cursor: pointer;
  border: 1px solid var(--c-border);
}

/* Staggered animation delays */
.task-card:nth-child(1) { animation-delay: 0s; }
.task-card:nth-child(2) { animation-delay: 0.04s; }
.task-card:nth-child(3) { animation-delay: 0.08s; }
.task-card:nth-child(4) { animation-delay: 0.12s; }
.task-card:nth-child(5) { animation-delay: 0.16s; }
.task-card:nth-child(6) { animation-delay: 0.2s; }
.task-card:nth-child(7) { animation-delay: 0.24s; }
.task-card:nth-child(8) { animation-delay: 0.28s; }

.task-card.new-task {
  animation: springInFromRight 0.6s var(--spring) both;
}

.task-card.removing {
  animation: slideOutLeft 0.45s var(--ease-out) forwards;
}

.task-card.completed {
  opacity: 0.6;
}

.task-card:active {
  transform: scale(0.985);
}

/* ── Category Icon (right side in RTL) ── */
.task-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  order: -1;
}

.task-icon span {
  position: relative;
  z-index: 1;
  line-height: 1;
}

.task-icon-work {
  background: linear-gradient(135deg, #3b82f6, #93c5fd);
}

.task-icon-work span {
  animation: iconFloat 3s ease-in-out infinite;
}

.task-icon-personal {
  background: linear-gradient(135deg, #22c55e, #86efac);
}

.task-icon-personal span {
  animation: iconPulse 2.5s ease-in-out infinite;
}

.task-icon-shopping {
  background: linear-gradient(135deg, #f97316, #fdba74);
}

.task-icon-shopping span {
  animation: iconBounce 2s ease-in-out infinite;
}

.task-card.completed .task-icon {
  opacity: 0.45;
  filter: grayscale(0.5);
}

.task-card.completed .task-icon span {
  animation: none;
}

/* ── Task Content (middle) ── */
.task-content {
  flex: 1;
  min-width: 0;
}

.task-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--c-text);
  transition: all var(--transition);
  line-height: 1.4;
}

.task-card.completed .task-title {
  text-decoration: line-through;
  color: var(--c-text-light);
}

.task-meta {
  display: flex;
  gap: 6px;
  margin-top: 5px;
  flex-wrap: wrap;
  align-items: center;
}

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2px;
}

.tag-work { background: var(--c-primary-light); color: var(--c-primary); }
.tag-personal { background: var(--c-success-light); color: var(--c-success); }
.tag-shopping { background: var(--c-orange-light); color: var(--c-orange); }

.priority-badge {
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2px;
}

.priority-high { background: var(--c-danger-light); color: var(--c-danger); }
.priority-medium { background: var(--c-warning-light); color: var(--c-warning); }
.priority-low { background: var(--c-success-light); color: var(--c-success); }

/* ── Checkbox ── */
.task-checkbox {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2.5px solid var(--c-border);
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-width: 44px;
  min-height: 44px;
  background-clip: content-box;
  padding: 10px;
  box-sizing: content-box;
  margin: -10px;
  margin-right: -6px;
}

.task-checkbox::after {
  content: '';
  width: 9px;
  height: 5px;
  border-bottom: 2.5px solid #fff;
  border-left: 2.5px solid #fff;
  border-right: none;
  transform: rotate(45deg) scale(0);
  transition: transform 0.25s var(--spring);
  margin-top: -2px;
}

.task-checkbox.checked {
  background-color: var(--c-success);
  border-color: var(--c-success);
}

.task-checkbox.checked::after {
  transform: rotate(45deg) scale(1);
}

.task-checkbox.pop {
  animation: checkSpring 0.35s var(--spring);
}

/* ── Delete Button (left side in RTL) ── */
.task-delete {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--c-text-light);
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
  min-width: 44px;
  min-height: 44px;
  padding: 6px;
  margin: -6px;
  margin-left: 0;
}

.task-delete:hover,
.task-delete:active {
  background: var(--c-danger-light);
  color: var(--c-danger);
}

/* ── Confetti Particles ── */
.confetti-particle {
  position: absolute;
  pointer-events: none;
  font-size: 16px;
  z-index: 10;
  animation: confettiBurst 0.75s ease-out forwards;
}

/* ── FAB Button ── */
.fab {
  position: fixed;
  bottom: 86px;
  left: 50%;
  transform: translateX(-50%);
  width: 58px;
  height: 58px;
  border: none;
  background: linear-gradient(135deg, var(--c-from), var(--c-accent));
  color: #fff;
  border-radius: 50%;
  font-size: 30px;
  font-weight: 300;
  cursor: pointer;
  z-index: 100;
  transition: transform 0.2s var(--spring);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fabGlow 2.8s ease-in-out infinite;
}

@media (min-width: 421px) {
  .fab { left: calc(50%); }
}

.fab:active {
  transform: translateX(-50%) scale(0.88) rotate(90deg);
  animation: none;
}

/* ── Bottom Nav (Glass with blur) ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: var(--c-nav-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--c-nav-border);
  padding: 8px 16px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  z-index: 99;
  box-shadow: 0 -2px 24px rgba(0,0,0,0.04);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
  min-width: 44px;
  min-height: 44px;
  border-radius: 12px;
  color: var(--c-text-light);
}

.nav-item.active {
  color: var(--c-primary);
}

.nav-item:active {
  background: var(--c-primary-light);
}

.nav-icon {
  font-size: 22px;
  line-height: 1;
}

.nav-label {
  font-size: 10px;
  font-weight: 600;
}

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--c-text-light);
  position: relative;
}

.empty-illustration {
  position: relative;
  width: 120px;
  height: 120px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.empty-main-icon {
  font-size: 52px;
  animation: emptyFloat 3s ease-in-out infinite;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

.empty-orb {
  position: absolute;
  border-radius: 50%;
  animation: emptyOrb 3s ease-in-out infinite;
}

.empty-orb-1 {
  width: 24px; height: 24px;
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  top: 8px; right: 8px;
}

.empty-orb-2 {
  width: 16px; height: 16px;
  background: linear-gradient(135deg, #dcfce7, #bbf7d0);
  bottom: 12px; left: 10px;
  animation-delay: 0.5s;
}

.empty-orb-3 {
  width: 20px; height: 20px;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  top: 20px; left: 5px;
  animation-delay: 1s;
}

.empty-orb-4 {
  width: 12px; height: 12px;
  background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
  bottom: 20px; right: 15px;
  animation-delay: 1.5s;
}

.empty-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--c-text-secondary);
}

.empty-subtext {
  font-size: 13px;
  margin-top: 4px;
  color: var(--c-text-light);
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 155px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--c-toast-bg);
  color: var(--c-toast-text);
  padding: 12px 24px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  z-index: 200;
  opacity: 0;
  transition: all 0.35s var(--spring);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: var(--shadow-xl);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Swipe delete background ── */
.swipe-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--c-danger);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 0 20px;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  z-index: -1;
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-orb header-orb-1"></div>
  <div class="header-orb header-orb-2"></div>
  <div class="header-orb header-orb-3"></div>
  <div class="header-orb header-orb-4"></div>
  <div class="header-orb header-orb-5"></div>
  <div class="header-top">
    <div>
      <div class="header-title">TaskMaster</div>
      <div class="header-subtitle">ניהול משימות חכם</div>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">סה"כ</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statCompleted">0</div>
      <div class="stat-label">הושלמו</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statPending">0</div>
      <div class="stat-label">פעילות</div>
    </div>
  </div>
</header>

<!-- Progress Bar -->
<div class="progress-section">
  <div class="progress-card glass-card">
    <div class="progress-header">
      <span class="progress-title">התקדמות יומית</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
  </div>
</div>

<!-- Filter Tabs -->
<div class="filter-section">
  <div class="filter-tabs" id="filterTabs">
    <div class="filter-indicator" id="filterIndicator"></div>
    <button class="filter-tab active" data-filter="all">
      הכל
      <span class="filter-count" id="countAll">0</span>
    </button>
    <button class="filter-tab" data-filter="active">
      פעילות
      <span class="filter-count" id="countActive">0</span>
    </button>
    <button class="filter-tab" data-filter="completed">
      הושלמו
      <span class="filter-count" id="countCompleted">0</span>
    </button>
  </div>
</div>

<!-- Add Task -->
<div class="add-section">
  <div class="add-card">
    <div class="add-input-wrapper">
      <input type="text" class="add-input" id="addInput" placeholder="הוסף משימה חדשה..." autocomplete="off">
      <div class="category-selector" id="catSelector">
        <button class="cat-option selected" data-cat="work">עבודה</button>
        <button class="cat-option" data-cat="personal">אישי</button>
        <button class="cat-option" data-cat="shopping">קניות</button>
      </div>
      <div class="priority-selector" id="priSelector">
        <button class="pri-option" data-pri="high">גבוה</button>
        <button class="pri-option selected" data-pri="medium">בינוני</button>
        <button class="pri-option" data-pri="low">נמוך</button>
      </div>
    </div>
    <button class="add-btn" id="addBtn" aria-label="הוסף משימה">+</button>
  </div>
</div>

<!-- Task List -->
<div class="task-list" id="taskList"></div>

<!-- FAB -->
<button class="fab" id="fabBtn" aria-label="משימה חדשה">+</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-item active" data-nav="tasks">
    <span class="nav-icon">&#9776;</span>
    <span class="nav-label">משימות</span>
  </button>
  <button class="nav-item" data-nav="calendar">
    <span class="nav-icon">&#128197;</span>
    <span class="nav-label">לוח שנה</span>
  </button>
  <button class="nav-item" data-nav="stats">
    <span class="nav-icon">&#128200;</span>
    <span class="nav-label">סטטיסטיקה</span>
  </button>
  <button class="nav-item" data-nav="settings">
    <span class="nav-icon">&#9881;</span>
    <span class="nav-label">הגדרות</span>
  </button>
</nav>

<script>
(function() {
  'use strict';

  // ── Data ──
  var CATEGORIES = {
    work:     { label: 'עבודה',  tagClass: 'tag-work',     iconClass: 'task-icon-work',     emoji: '💼' },
    personal: { label: 'אישי',   tagClass: 'tag-personal', iconClass: 'task-icon-personal', emoji: '🌟' },
    shopping: { label: 'קניות',  tagClass: 'tag-shopping', iconClass: 'task-icon-shopping', emoji: '🛒' }
  };

  var PRIORITIES = {
    high:   { label: 'גבוה',  badgeClass: 'priority-high' },
    medium: { label: 'בינוני', badgeClass: 'priority-medium' },
    low:    { label: 'נמוך',   badgeClass: 'priority-low' }
  };

  var CONFETTI_EMOJIS = ['✨', '⭐', '✅', '🎉', '💜', '🌟'];

  var tasks = [
    { id: 1, title: 'להכין מצגת לפגישת צוות', completed: false, category: 'work', priority: 'high' },
    { id: 2, title: 'לקנות מתנת יום הולדת לדנה', completed: false, category: 'personal', priority: 'medium' },
    { id: 3, title: 'לשלוח דוח חודשי למנהל', completed: true, category: 'work', priority: 'high' },
    { id: 4, title: 'חלב, ביצים, לחם, גבינה', completed: false, category: 'shopping', priority: 'low' },
    { id: 5, title: 'לתאם פגישה עם לקוח חדש', completed: false, category: 'work', priority: 'medium' },
    { id: 6, title: 'לסיים קורס אונליין - פרק 5', completed: true, category: 'personal', priority: 'medium' },
    { id: 7, title: 'לעדכן קורות חיים', completed: true, category: 'personal', priority: 'low' },
    { id: 8, title: 'להזמין מסעדה לערב שישי', completed: false, category: 'personal', priority: 'medium' }
  ];

  var nextId = 9;
  var currentFilter = 'all';
  var selectedCategory = 'work';
  var selectedPriority = 'medium';

  // ── DOM Refs ──
  var taskListEl     = document.getElementById('taskList');
  var addInputEl     = document.getElementById('addInput');
  var addBtnEl       = document.getElementById('addBtn');
  var fabEl          = document.getElementById('fabBtn');
  var toastEl        = document.getElementById('toast');
  var headerDateEl   = document.getElementById('headerDate');
  var progressBar    = document.getElementById('progressBar');
  var progressPct    = document.getElementById('progressPercent');
  var statTotal      = document.getElementById('statTotal');
  var statCompleted  = document.getElementById('statCompleted');
  var statPending    = document.getElementById('statPending');
  var countAll       = document.getElementById('countAll');
  var countActive    = document.getElementById('countActive');
  var countCompleted = document.getElementById('countCompleted');
  var filterTabsEl   = document.getElementById('filterTabs');
  var filterIndicator = document.getElementById('filterIndicator');

  // ── Set Date ──
  function setDate() {
    var now = new Date();
    var days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    var months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    headerDateEl.textContent = 'יום ' + days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()];
  }
  setDate();

  // ── Filter Indicator Position ──
  function updateFilterIndicator() {
    var activeTab = filterTabsEl.querySelector('.filter-tab.active');
    if (!activeTab) return;
    var tabsRect = filterTabsEl.getBoundingClientRect();
    var activeRect = activeTab.getBoundingClientRect();
    filterIndicator.style.width = activeRect.width + 'px';
    // In RTL, use right-based positioning
    filterIndicator.style.right = (tabsRect.right - activeRect.right) + 'px';
    filterIndicator.style.left = 'auto';
  }

  // ── Toast ──
  var toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2200);
  }

  // ── Stats ──
  function updateStats() {
    var total = tasks.length;
    var done = tasks.filter(function(t) { return t.completed; }).length;
    var pending = total - done;
    var pct = total === 0 ? 0 : Math.round((done / total) * 100);

    statTotal.textContent = total;
    statCompleted.textContent = done;
    statPending.textContent = pending;
    progressPct.textContent = pct + '%';
    progressBar.style.width = pct + '%';

    countAll.textContent = total;
    countActive.textContent = pending;
    countCompleted.textContent = done;
  }

  // ── Filter ──
  function getFilteredTasks() {
    if (currentFilter === 'active') {
      return tasks.filter(function(t) { return !t.completed; });
    }
    if (currentFilter === 'completed') {
      return tasks.filter(function(t) { return t.completed; });
    }
    return tasks.slice();
  }

  // ── Confetti Burst ──
  function spawnConfetti(card) {
    var cardW = card.offsetWidth;
    var cardH = card.offsetHeight;

    for (var i = 0; i < 6; i++) {
      var particle = document.createElement('span');
      particle.className = 'confetti-particle';
      particle.textContent = CONFETTI_EMOJIS[i % CONFETTI_EMOJIS.length];

      // Random start position near center
      var startX = cardW * 0.3 + Math.random() * cardW * 0.4;
      var startY = cardH * 0.2 + Math.random() * cardH * 0.6;

      // Random trajectory
      var angle = (Math.PI * 2 / 6) * i + (Math.random() - 0.5) * 0.6;
      var distance = 40 + Math.random() * 50;
      var endX = startX + Math.cos(angle) * distance;
      var endY = startY + Math.sin(angle) * distance - 30;

      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      particle.style.setProperty('--end-x', endX + 'px');
      particle.style.setProperty('--end-y', endY + 'px');

      // Custom trajectory via inline animation
      var rotation = Math.round(Math.random() * 360);
      particle.style.animation = 'none';
      particle.style.opacity = '1';
      card.appendChild(particle);

      // Trigger reflow then animate
      (function(el, ex, ey, rot, delay) {
        setTimeout(function() {
          el.style.transition = 'all 0.65s cubic-bezier(0.16, 1, 0.3, 1)';
          el.style.left = ex + 'px';
          el.style.top = ey + 'px';
          el.style.transform = 'scale(0) rotate(' + rot + 'deg)';
          el.style.opacity = '0';
        }, delay);
      })(particle, endX, endY, rotation, i * 50 + 10);
    }

    setTimeout(function() {
      var leftovers = card.querySelectorAll('.confetti-particle');
      for (var j = 0; j < leftovers.length; j++) {
        leftovers[j].remove();
      }
    }, 900);
  }

  // ── Render ──
  function renderTasks(newTaskId) {
    var filtered = getFilteredTasks();
    taskListEl.innerHTML = '';

    if (filtered.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';

      var mainEmoji = currentFilter === 'completed' ? '🏆' : (currentFilter === 'active' ? '🎉' : '📋');
      var text = currentFilter === 'completed' ? 'אין משימות שהושלמו' : (currentFilter === 'active' ? 'כל המשימות הושלמו!' : 'אין משימות עדיין');
      var sub = currentFilter === 'active' ? 'כל הכבוד! סיימת הכל' : 'לחץ על + כדי להוסיף משימה';

      empty.innerHTML =
        '<div class="empty-illustration">' +
          '<span class="empty-main-icon">' + mainEmoji + '</span>' +
          '<div class="empty-orb empty-orb-1"></div>' +
          '<div class="empty-orb empty-orb-2"></div>' +
          '<div class="empty-orb empty-orb-3"></div>' +
          '<div class="empty-orb empty-orb-4"></div>' +
        '</div>' +
        '<div class="empty-text">' + text + '</div>' +
        '<div class="empty-subtext">' + sub + '</div>';
      taskListEl.appendChild(empty);
      updateStats();
      return;
    }

    filtered.forEach(function(task, i) {
      var card = document.createElement('div');
      card.className = 'task-card' + (task.completed ? ' completed' : '');
      if (newTaskId && task.id === newTaskId) {
        card.className += ' new-task';
      }
      card.dataset.id = task.id;
      card.style.animationDelay = (i * 0.04) + 's';

      var cat = CATEGORIES[task.category] || CATEGORIES.work;
      var pri = PRIORITIES[task.priority] || PRIORITIES.medium;

      // Layout: icon (right) | content (middle) | delete (left) + checkbox near delete
      card.innerHTML =
        '<div class="task-icon ' + cat.iconClass + '">' +
          '<span>' + cat.emoji + '</span>' +
        '</div>' +
        '<div class="task-content" data-action="toggle">' +
          '<div class="task-title">' + escapeHtml(task.title) + '</div>' +
          '<div class="task-meta">' +
            '<span class="tag ' + cat.tagClass + '">' + cat.label + '</span>' +
            '<span class="priority-badge ' + pri.badgeClass + '">' + pri.label + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="task-delete" data-action="delete" aria-label="מחק משימה">&times;</button>' +
        '<div class="task-checkbox' + (task.completed ? ' checked' : '') + '" data-action="toggle"></div>';

      taskListEl.appendChild(card);
    });

    updateStats();
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ── Task Actions ──
  function toggleTask(id) {
    var task = tasks.find(function(t) { return t.id === id; });
    if (!task) return;
    task.completed = !task.completed;

    var card = taskListEl.querySelector('[data-id="' + id + '"]');
    if (card) {
      var cb = card.querySelector('.task-checkbox');
      cb.classList.add('pop');
      setTimeout(function() { cb.classList.remove('pop'); }, 350);

      if (task.completed) {
        spawnConfetti(card);
      }
    }

    if (task.completed) {
      showToast('משימה הושלמה! ✓');
    } else {
      showToast('המשימה חזרה לפעילות');
    }

    setTimeout(function() { renderTasks(); }, 220);
  }

  function deleteTask(id) {
    var card = taskListEl.querySelector('[data-id="' + id + '"]');
    if (card) {
      card.classList.add('removing');
      setTimeout(function() {
        tasks = tasks.filter(function(t) { return t.id !== id; });
        renderTasks();
        showToast('המשימה נמחקה');
      }, 450);
    } else {
      tasks = tasks.filter(function(t) { return t.id !== id; });
      renderTasks();
    }
  }

  function addTask() {
    var title = addInputEl.value.trim();
    if (!title) {
      addInputEl.focus();
      addInputEl.style.borderColor = 'var(--c-danger)';
      setTimeout(function() { addInputEl.style.borderColor = ''; }, 1000);
      return;
    }

    var task = {
      id: nextId++,
      title: title,
      completed: false,
      category: selectedCategory,
      priority: selectedPriority
    };

    tasks.unshift(task);
    addInputEl.value = '';
    renderTasks(task.id);
    showToast('משימה חדשה נוספה!');
    taskListEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Event Listeners ──

  // Task list delegation
  taskListEl.addEventListener('click', function(e) {
    var target = e.target;
    while (target && target !== taskListEl) {
      var action = target.dataset.action;
      if (action) {
        var card = target.closest('.task-card');
        if (card) {
          var id = parseInt(card.dataset.id, 10);
          if (action === 'toggle') {
            toggleTask(id);
          } else if (action === 'delete') {
            e.stopPropagation();
            deleteTask(id);
          }
        }
        return;
      }
      target = target.parentElement;
    }
  });

  // Add button
  addBtnEl.addEventListener('click', function(e) {
    e.preventDefault();
    addTask();
  });

  // Enter key
  addInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTask();
    }
  });

  // FAB
  fabEl.addEventListener('click', function() {
    addInputEl.focus();
    addInputEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  // Filter tabs with sliding indicator
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      updateFilterIndicator();
      renderTasks();
    });
  });

  // Category selector
  document.querySelectorAll('.cat-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.cat-option').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedCategory = btn.dataset.cat;
    });
  });

  // Priority selector
  document.querySelectorAll('.pri-option').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.pri-option').forEach(function(b) { b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedPriority = btn.dataset.pri;
    });
  });

  // Bottom nav
  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });
      item.classList.add('active');
      if (item.dataset.nav !== 'tasks') {
        showToast('בקרוב: ' + item.querySelector('.nav-label').textContent);
      }
    });
  });

  // ── Swipe to Delete ──
  (function initSwipe() {
    var startX = 0, startY = 0, currentCard = null, isDragging = false;

    taskListEl.addEventListener('touchstart', function(e) {
      var card = e.target.closest('.task-card');
      if (!card || e.target.closest('.task-delete')) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      currentCard = card;
      isDragging = false;
    }, { passive: true });

    taskListEl.addEventListener('touchmove', function(e) {
      if (!currentCard) return;
      var dx = e.touches[0].clientX - startX;
      var dy = e.touches[0].clientY - startY;

      if (!isDragging) {
        if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          isDragging = true;
        } else if (Math.abs(dy) > 10) {
          currentCard = null;
          return;
        }
      }

      if (isDragging) {
        var offset = dx;
        if (offset > 0) offset = 0;
        currentCard.style.transform = 'translateX(' + offset + 'px)';
        currentCard.style.transition = 'none';
        e.preventDefault();
      }
    }, { passive: false });

    taskListEl.addEventListener('touchend', function() {
      if (!currentCard) return;
      if (isDragging) {
        var transform = currentCard.style.transform;
        var match = transform.match(/translateX\((-?\d+(\.\d+)?)px\)/);
        var offset = match ? parseFloat(match[1]) : 0;

        currentCard.style.transition = 'transform 0.35s ' + 'cubic-bezier(0.34, 1.56, 0.64, 1)';

        if (offset < -100) {
          var id = parseInt(currentCard.dataset.id, 10);
          deleteTask(id);
        } else {
          currentCard.style.transform = '';
        }
      }
      currentCard = null;
      isDragging = false;
    }, { passive: true });
  })();

  // ── Initial Render ──
  renderTasks();

  // Position filter indicator after layout settles
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      updateFilterIndicator();
    });
  });

  // Update indicator on resize
  window.addEventListener('resize', updateFilterIndicator);

})();
</script>
</body>
</html>
