<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{}">
<title>Foodie - הזמנת אוכל</title>
<style>
:root {
  --c-from: #f97316;
  --c-to: #fb923c;
  --c-primary: #f97316;
  --c-bg: #fafafa;
  --c-card: #ffffff;
  --c-text: #1f2937;
  --c-text-secondary: #6b7280;
  --c-border: #f3f4f6;
  --c-star: #fbbf24;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --nav-height: 64px;
  --order-bar-height: 68px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-height) + 16px);
  position: relative;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--c-from), var(--c-to));
  padding: 48px 20px 24px;
  border-radius: 0 0 24px 24px;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -30px;
  left: -30px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -20px;
  right: -20px;
  width: 80px;
  height: 80px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.header-title {
  font-size: 28px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.5px;
}

.header-subtitle {
  color: rgba(255,255,255,0.9);
  font-size: 14px;
  margin-bottom: 16px;
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* Search */
.search-container {
  position: relative;
}

.search-input {
  width: 100%;
  padding: 14px 44px 14px 16px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  background: rgba(255,255,255,0.95);
  color: var(--c-text);
  outline: none;
  direction: rtl;
  backdrop-filter: blur(10px);
}

.search-input::placeholder {
  color: var(--c-text-secondary);
}

.search-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  opacity: 0.5;
}

/* Promo Banner */
.promo-banner {
  margin: 16px 16px 0;
  padding: 14px 18px;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  color: #92400e;
  box-shadow: var(--shadow);
  animation: slideIn 0.5s ease;
}

.promo-banner .promo-icon {
  font-size: 24px;
  flex-shrink: 0;
}

/* Categories */
.categories {
  padding: 16px 16px 0;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.categories::-webkit-scrollbar {
  display: none;
}

.category-chip {
  flex-shrink: 0;
  padding: 10px 16px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  background: var(--c-card);
  color: var(--c-text-secondary);
  border: 1.5px solid var(--c-border);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 4px;
  user-select: none;
  white-space: nowrap;
}

.category-chip.active {
  background: linear-gradient(135deg, var(--c-from), var(--c-to));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
  transform: scale(1.05);
}

.category-chip:active {
  transform: scale(0.95);
}

/* Menu Grid */
.menu-section {
  padding: 20px 16px;
}

.menu-section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
}

.menu-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Menu Card */
.menu-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 14px;
  align-items: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: fadeInUp 0.4s ease forwards;
  opacity: 0;
  position: relative;
  overflow: hidden;
}

.menu-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 4s ease-in-out infinite;
  pointer-events: none;
}

.menu-card:nth-child(1) { animation-delay: 0.05s; }
.menu-card:nth-child(1)::before { animation-delay: 0s; }
.menu-card:nth-child(2) { animation-delay: 0.1s; }
.menu-card:nth-child(2)::before { animation-delay: 0.7s; }
.menu-card:nth-child(3) { animation-delay: 0.15s; }
.menu-card:nth-child(3)::before { animation-delay: 1.4s; }
.menu-card:nth-child(4) { animation-delay: 0.2s; }
.menu-card:nth-child(4)::before { animation-delay: 2.1s; }
.menu-card:nth-child(5) { animation-delay: 0.25s; }
.menu-card:nth-child(5)::before { animation-delay: 2.8s; }
.menu-card:nth-child(6) { animation-delay: 0.3s; }
.menu-card:nth-child(6)::before { animation-delay: 3.5s; }

.menu-card.hidden {
  display: none;
}

.menu-card:active {
  transform: scale(0.98);
}

/* Food Visual Area */
.food-visual {
  width: 110px;
  height: 100px;
  border-radius: 14px;
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.visual-bubbles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.visual-bubbles::before {
  content: '';
  position: absolute;
  width: 30px;
  height: 30px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  top: -8px;
  right: -5px;
}

.visual-bubbles::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  bottom: 5px;
  left: 5px;
}

.visual-bubble-sm {
  position: absolute;
  width: 14px;
  height: 14px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  top: 50%;
  left: 18px;
}

.food-icon {
  font-size: 52px;
  line-height: 1;
  display: block;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

.food-icon.hot {
  animation: float 3s infinite ease-in-out;
}

.food-icon.cold {
  animation: wobble 3s infinite ease-in-out;
}

/* Steam Lines */
.steam-lines {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 3;
  pointer-events: none;
}

.steam-lines span {
  display: block;
  width: 2px;
  background: rgba(255,255,255,0.6);
  border-radius: 2px;
  animation: steam 2s infinite ease-out;
}

.steam-lines span:nth-child(1) {
  height: 18px;
  animation-delay: 0s;
}

.steam-lines span:nth-child(2) {
  height: 24px;
  animation-delay: 0.3s;
}

.steam-lines span:nth-child(3) {
  height: 15px;
  animation-delay: 0.6s;
}

.menu-card-info {
  flex: 1;
  min-width: 0;
}

.menu-card-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 3px;
}

.menu-card-desc {
  font-size: 13px;
  color: var(--c-text-secondary);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.menu-card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.menu-card-price {
  font-size: 18px;
  font-weight: 800;
  color: var(--c-primary);
}

.menu-card-rating {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  color: var(--c-text-secondary);
}

.menu-card-rating .star {
  color: var(--c-star);
}

.add-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c-from), var(--c-to));
  color: white;
  border: none;
  font-size: 24px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
}

.add-btn:active {
  transform: scale(0.85);
}

.add-btn.added {
  animation: springPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Order Bar */
.order-bar {
  position: fixed;
  bottom: calc(var(--nav-height) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  width: calc(100% - 32px);
  max-width: 388px;
  background: linear-gradient(135deg, var(--c-from), var(--c-to));
  border-radius: 20px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 8px 32px rgba(249, 115, 22, 0.4);
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 100;
  cursor: pointer;
}

.order-bar.visible {
  transform: translateX(-50%) translateY(0);
}

.order-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.order-count {
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: white;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.order-count.bounce {
  animation: bounceCount 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.order-bar-text {
  color: white;
  font-size: 15px;
  font-weight: 600;
}

.order-bar-total {
  color: white;
  font-size: 18px;
  font-weight: 800;
}

.view-order-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: var(--nav-height);
  background: var(--c-card);
  border-top: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 12px;
  transition: all 0.2s ease;
  min-width: 44px;
  min-height: 44px;
  justify-content: center;
}

.nav-item.active {
  color: var(--c-primary);
}

.nav-item:not(.active) {
  color: var(--c-text-secondary);
}

.nav-icon {
  font-size: 22px;
}

.nav-label {
  font-size: 11px;
  font-weight: 600;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.modal-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--c-card);
  width: 100%;
  max-width: 420px;
  max-height: 80vh;
  border-radius: 24px 24px 0 0;
  padding: 24px 20px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
}

.modal-overlay.visible .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 40px;
  height: 4px;
  background: #d1d5db;
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
  text-align: center;
}

.order-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--c-border);
}

.order-item:last-child {
  border-bottom: none;
}

.order-item-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.order-item-emoji {
  font-size: 28px;
}

.order-item-name {
  font-size: 15px;
  font-weight: 600;
}

.order-item-qty {
  font-size: 13px;
  color: var(--c-text-secondary);
}

.order-item-price {
  font-size: 16px;
  font-weight: 700;
  color: var(--c-primary);
}

.order-item-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--c-border);
  background: transparent;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--c-text);
  transition: all 0.2s;
}

.qty-btn:active {
  transform: scale(0.9);
  background: var(--c-border);
}

.qty-display {
  font-size: 16px;
  font-weight: 700;
  min-width: 20px;
  text-align: center;
}

.order-total-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 2px dashed var(--c-border);
}

.order-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 15px;
}

.order-total-row.total {
  font-size: 20px;
  font-weight: 800;
  margin-top: 12px;
}

.order-total-row .free-delivery {
  color: #16a34a;
  font-weight: 600;
}

.checkout-btn {
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--c-from), var(--c-to));
  color: white;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
  box-shadow: 0 4px 16px rgba(249, 115, 22, 0.3);
  transition: all 0.2s;
}

.checkout-btn:active {
  transform: scale(0.97);
}

.empty-order {
  text-align: center;
  padding: 40px 20px;
  color: var(--c-text-secondary);
}

.empty-order-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.empty-order-text {
  font-size: 16px;
  font-weight: 500;
}

/* Animations */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes springPop {
  0% { transform: scale(1); }
  30% { transform: scale(1.3); }
  50% { transform: scale(0.9); }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

@keyframes bounceCount {
  0% { transform: scale(1); }
  40% { transform: scale(1.4); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes float {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-6px);
  }
}

@keyframes steam {
  0% {
    opacity: 0.6;
    transform: translateY(0) scaleX(1);
  }
  50% {
    opacity: 0.3;
    transform: translateY(-10px) scaleX(1.2);
  }
  100% {
    opacity: 0;
    transform: translateY(-20px) scaleX(0.8);
  }
}

@keyframes shimmer {
  0% {
    left: -100%;
  }
  50%, 100% {
    left: 100%;
  }
}

@keyframes wobble {
  0%, 100% {
    transform: rotate(0deg) translateY(0);
  }
  25% {
    transform: rotate(-3deg) translateY(-2px);
  }
  50% {
    transform: rotate(0deg) translateY(-4px);
  }
  75% {
    transform: rotate(3deg) translateY(-2px);
  }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <div>
      <h1 class="header-title">Foodie</h1>
      <p class="header-subtitle">מה בא לך לאכול היום? 😋</p>
    </div>
    <div class="avatar">👤</div>
  </div>
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" placeholder="חיפוש מנות..." id="searchInput">
  </div>
</header>

<!-- Promo Banner -->
<div class="promo-banner">
  <span class="promo-icon">🚚</span>
  <span>משלוח חינם! בהזמנה מעל ₪80</span>
</div>

<!-- Categories -->
<div class="categories" id="categories">
  <button class="category-chip active" data-category="all">🍕 הכל</button>
  <button class="category-chip" data-category="burger">🍔 המבורגר</button>
  <button class="category-chip" data-category="sushi">🍣 סושי</button>
  <button class="category-chip" data-category="israeli">🥙 ישראלי</button>
  <button class="category-chip" data-category="pasta">🍝 פסטה</button>
</div>

<!-- Menu -->
<section class="menu-section">
  <h2 class="menu-section-title">תפריט 🔥</h2>
  <div class="menu-grid" id="menuGrid"></div>
</section>

<!-- Order Bar -->
<div class="order-bar" id="orderBar" onclick="openModal()">
  <div class="order-bar-right">
    <div class="order-count" id="orderCount">0</div>
    <span class="order-bar-text">צפה בהזמנה</span>
  </div>
  <div class="order-bar-total" id="orderTotal">₪0</div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">בית</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">🔍</span>
    <span class="nav-label">חיפוש</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">📋</span>
    <span class="nav-label">הזמנות</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">👤</span>
    <span class="nav-label">חשבון</span>
  </div>
</nav>

<!-- Order Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2 class="modal-title">ההזמנה שלך 🛒</h2>
    <div id="orderItems"></div>
    <div class="order-total-section" id="orderTotalSection" style="display:none;">
      <div class="order-total-row">
        <span>סכום ביניים</span>
        <span id="subtotalDisplay">₪0</span>
      </div>
      <div class="order-total-row">
        <span>משלוח</span>
        <span id="deliveryDisplay" class="free-delivery">חינם</span>
      </div>
      <div class="order-total-row total">
        <span>סה"כ</span>
        <span id="totalDisplay">₪0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">לתשלום 💳</button>
    </div>
  </div>
</div>

<script>
// Menu data
const menuItems = [

// State
let order = {};
let activeCategory = 'all';

// Render menu
function renderMenu() {
  const grid = document.getElementById('menuGrid');
  const searchQuery = document.getElementById('searchInput').value.trim();

  grid.innerHTML = '';

  menuItems.forEach((item, index) => {
    const matchesCategory = activeCategory === 'all' || item.category === activeCategory;
    const matchesSearch = !searchQuery || item.name.includes(searchQuery) || item.desc.includes(searchQuery);

    if (!matchesCategory || !matchesSearch) return;

    const card = document.createElement('div');
    card.className = 'menu-card';
    card.style.animationDelay = `${index * 0.05}s`;

    const steamHTML = item.isHot
      ? '<div class="steam-lines"><span></span><span></span><span></span></div>'
      : '';

    const iconClass = item.isHot ? 'hot' : 'cold';

    card.innerHTML = `
      <div class="food-visual" style="background:linear-gradient(135deg, ${item.gradient[0]}, ${item.gradient[1]})">
        <div class="visual-bubbles"></div>
        <div class="visual-bubble-sm"></div>
        <span class="food-icon ${iconClass}">${item.emoji}</span>
        ${steamHTML}
      </div>
      <div class="menu-card-info">
        <div class="menu-card-name">${item.name}</div>
        <div class="menu-card-desc">${item.desc}</div>
        <div class="menu-card-bottom">
          <span class="menu-card-price">₪${item.price}</span>
          <span class="menu-card-rating">
            <span class="star">★</span> ${item.rating} (${item.reviews})
          </span>
        </div>
      </div>
      <button class="add-btn" onclick="addToOrder(${item.id}, this)" aria-label="הוסף לסל">+</button>
    `;
    grid.appendChild(card);
  });
}

// Add to order
function addToOrder(id, btn) {
  if (order[id]) {
    order[id]++;
  } else {
    order[id] = 1;
  }

  // Animate button
  btn.classList.remove('added');
  void btn.offsetWidth; // Force reflow
  btn.classList.add('added');

  updateOrderBar();
}

// Update order bar
function updateOrderBar() {
  const totalItems = Object.values(order).reduce((a, b) => a + b, 0);
  const totalPrice = Object.entries(order).reduce((sum, [id, qty]) => {
    const item = menuItems.find(m => m.id === parseInt(id));
    return sum + (item.price * qty);
  }, 0);

  const orderBar = document.getElementById('orderBar');
  const countEl = document.getElementById('orderCount');
  const totalEl = document.getElementById('orderTotal');

  countEl.textContent = totalItems;
  totalEl.textContent = `₪${totalPrice}`;

  // Bounce animation on count
  countEl.classList.remove('bounce');
  void countEl.offsetWidth;
  countEl.classList.add('bounce');

  if (totalItems > 0) {
    orderBar.classList.add('visible');
  } else {
    orderBar.classList.remove('visible');
  }
}

// Open modal
function openModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('visible');
  renderOrderModal();
  document.body.style.overflow = 'hidden';
}

// Close modal
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('visible');
  document.body.style.overflow = '';
}

// Render order modal
function renderOrderModal() {
  const container = document.getElementById('orderItems');
  const totalSection = document.getElementById('orderTotalSection');

  const orderEntries = Object.entries(order).filter(([_, qty]) => qty > 0);

  if (orderEntries.length === 0) {
    container.innerHTML = `
      <div class="empty-order">
        <div class="empty-order-icon">🛒</div>
        <div class="empty-order-text">ההזמנה ריקה</div>
      </div>
    `;
    totalSection.style.display = 'none';
    return;
  }

  totalSection.style.display = 'block';

  let html = '';
  let subtotal = 0;

  orderEntries.forEach(([id, qty]) => {
    const item = menuItems.find(m => m.id === parseInt(id));
    const itemTotal = item.price * qty;
    subtotal += itemTotal;

    html += `
      <div class="order-item">
        <div class="order-item-right">
          <span class="order-item-emoji">${item.emoji}</span>
          <div>
            <div class="order-item-name">${item.name}</div>
            <div class="order-item-qty">₪${item.price} ליח'</div>
          </div>
        </div>
        <div class="order-item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
          <span class="qty-display">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          <span class="order-item-price">₪${itemTotal}</span>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  const delivery = subtotal >= 80 ? 0 : 15;
  const total = subtotal + delivery;

  document.getElementById('subtotalDisplay').textContent = `₪${subtotal}`;
  document.getElementById('deliveryDisplay').textContent = delivery === 0 ? 'חינם' : `₪${delivery}`;
  document.getElementById('deliveryDisplay').className = delivery === 0 ? 'free-delivery' : '';
  document.getElementById('totalDisplay').textContent = `₪${total}`;
}

// Change quantity
function changeQty(id, delta) {
  if (!order[id]) return;
  order[id] += delta;
  if (order[id] <= 0) {
    delete order[id];
  }
  updateOrderBar();
  renderOrderModal();

  // Close modal if empty
  if (Object.keys(order).length === 0) {
    setTimeout(() => closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') }), 300);
  }
}

// Checkout
function checkout() {
  const totalItems = Object.values(order).reduce((a, b) => a + b, 0);
  if (totalItems === 0) return;

  alert('ההזמנה נשלחה בהצלחה! 🎉\nתודה שהזמנת מ-Foodie');
  order = {};
  updateOrderBar();
  closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') });
}

// Category click
document.getElementById('categories').addEventListener('click', function(e) {
  const chip = e.target.closest('.category-chip');
  if (!chip) return;

  document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCategory = chip.dataset.category;
  renderMenu();
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  renderMenu();
});

// Bottom nav
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
  });
});

// Init
renderMenu();
</script>
