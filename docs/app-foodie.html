<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f97316">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{}">
<title>Foodie - הזמנת אוכל</title>
<style>
:root {
  --c-primary: #f97316;
  --c-primary-light: #fb923c;
  --c-primary-dark: #ea580c;
  --c-bg: #fafafa;
  --c-surface: #ffffff;
  --c-card: #ffffff;
  --c-text: #1a1a2e;
  --c-text-secondary: #6b7280;
  --c-text-muted: #9ca3af;
  --c-border: #f0f0f0;
  --c-star: #fbbf24;
  --c-success: #10b981;
  --c-skeleton: #e5e7eb;
  --c-skeleton-shine: #f3f4f6;
  --glass-bg: rgba(255, 255, 255, 0.72);
  --glass-border: rgba(255, 255, 255, 0.3);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
  --radius: 16px;
  --radius-sm: 12px;
  --radius-lg: 24px;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
  --nav-height: 72px;
  --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --spring-smooth: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

@media (prefers-color-scheme: dark) {
  :root {
    --c-bg: #0f1724;
    --c-surface: #1a2332;
    --c-card: #1e2a3a;
    --c-text: #f1f5f9;
    --c-text-secondary: #94a3b8;
    --c-text-muted: #64748b;
    --c-border: #2a3a4a;
    --c-skeleton: #2a3a4a;
    --c-skeleton-shine: #3a4a5a;
    --glass-bg: rgba(26, 35, 50, 0.78);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-height) + 20px);
  position: relative;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(145deg, var(--c-primary-dark), var(--c-primary), var(--c-primary-light));
  padding: 52px 20px 28px;
  border-radius: 0 0 28px 28px;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -40px;
  left: -40px;
  width: 150px;
  height: 150px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
}

.header::after {
  content: '';
  position: absolute;
  bottom: -30px;
  right: -30px;
  width: 100px;
  height: 100px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 50%;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  position: relative;
  z-index: 2;
}

.header-title {
  font-size: 30px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.5px;
}

.header-subtitle {
  color: rgba(255, 255, 255, 0.9);
  font-size: 14px;
  margin-bottom: 18px;
  position: relative;
  z-index: 2;
}

.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border: 1.5px solid rgba(255, 255, 255, 0.3);
}

/* ===== SEARCH (Frosted Glass) ===== */
.search-container {
  position: relative;
  z-index: 2;
}

.search-input {
  width: 100%;
  padding: 14px 48px 14px 16px;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: var(--radius-sm);
  font-size: 15px;
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: white;
  outline: none;
  direction: rtl;
  transition: all 0.3s ease;
}

.search-input::placeholder {
  color: rgba(255, 255, 255, 0.7);
}

.search-input:focus {
  background: rgba(255, 255, 255, 0.28);
  border-color: rgba(255, 255, 255, 0.4);
}

.search-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  opacity: 0.8;
  pointer-events: none;
}

/* ===== PROMO BANNER ===== */
.promo-banner {
  margin: 16px 16px 0;
  padding: 16px 20px;
  background: linear-gradient(135deg, #f97316, #f59e0b, #f97316);
  background-size: 200% 200%;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 700;
  color: white;
  box-shadow: 0 4px 20px rgba(249, 115, 22, 0.25);
  animation: promoPulse 3s ease-in-out infinite, promoGradient 4s ease infinite;
  position: relative;
  overflow: hidden;
}

.promo-banner::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
  animation: promoShine 4s ease-in-out infinite;
}

.promo-icon {
  font-size: 26px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.promo-text {
  position: relative;
  z-index: 1;
}

/* ===== CATEGORIES ===== */
.categories {
  padding: 16px 16px 0;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.categories::-webkit-scrollbar {
  display: none;
}

.category-chip {
  flex-shrink: 0;
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  background: var(--c-surface);
  color: var(--c-text-secondary);
  border: 1.5px solid var(--c-border);
  cursor: pointer;
  transition: all 0.3s var(--spring);
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 5px;
  user-select: none;
  white-space: nowrap;
}

.category-chip.active {
  background: linear-gradient(135deg, var(--c-primary-dark), var(--c-primary));
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 16px rgba(249, 115, 22, 0.35);
  transform: scale(1.05);
}

.category-chip:active {
  transform: scale(0.9);
  transition: transform 0.15s var(--spring);
}

/* ===== MENU SECTION ===== */
.menu-section {
  padding: 20px 16px;
}

.menu-section-title {
  font-size: 21px;
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -0.3px;
}

.menu-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ===== MENU CARD (Uber Eats Style) ===== */
.menu-card {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 14px;
  align-items: center;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(24px) scale(0.97);
  animation: springIn 0.6s var(--spring-smooth) forwards;
  border: 1px solid var(--c-border);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.menu-card:active {
  transform: scale(0.98);
  box-shadow: var(--shadow-md);
}

.menu-card:nth-child(1) { animation-delay: 0.05s; }
.menu-card:nth-child(2) { animation-delay: 0.12s; }
.menu-card:nth-child(3) { animation-delay: 0.19s; }
.menu-card:nth-child(4) { animation-delay: 0.26s; }
.menu-card:nth-child(5) { animation-delay: 0.33s; }
.menu-card:nth-child(6) { animation-delay: 0.40s; }

.menu-card.hidden {
  display: none;
}

/* ===== FOOD PHOTO ===== */
.food-photo-wrap {
  width: 100px;
  height: 100px;
  border-radius: 14px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: var(--c-skeleton);
}

.food-photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.4s ease;
}

.food-photo-wrap img.loading {
  opacity: 0;
}

.food-photo-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(0, 0, 0, 0.08) 100%);
  pointer-events: none;
  border-radius: 14px;
}

/* Gradient overlay on edges */
.food-photo-gradient {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background:
    linear-gradient(to left, rgba(0, 0, 0, 0.04), transparent 30%),
    linear-gradient(to bottom, transparent 70%, rgba(0, 0, 0, 0.06));
  pointer-events: none;
  z-index: 2;
}

/* ===== SKELETON LOADING ===== */
.skeleton {
  position: absolute;
  inset: 0;
  background: var(--c-skeleton);
  border-radius: 14px;
  overflow: hidden;
  z-index: 1;
  transition: opacity 0.3s ease;
}

.skeleton.hidden {
  opacity: 0;
  pointer-events: none;
}

.skeleton::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, var(--c-skeleton-shine), transparent);
  animation: shimmer 1.5s infinite;
  transform: translateX(-100%);
}

/* ===== CARD INFO ===== */
.menu-card-info {
  flex: 1;
  min-width: 0;
}

.menu-card-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.3;
}

.menu-card-desc {
  font-size: 13px;
  color: var(--c-text-secondary);
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.menu-card-bottom {
  display: flex;
  align-items: center;
  gap: 10px;
}

.menu-card-price {
  font-size: 18px;
  font-weight: 800;
  color: var(--c-primary);
}

.menu-card-rating {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  color: var(--c-text-muted);
  font-weight: 500;
}

.menu-card-rating .star {
  color: var(--c-star);
  font-size: 13px;
}

/* ===== ADD BUTTON ===== */
.add-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c-primary-dark), var(--c-primary));
  color: white;
  border: none;
  font-size: 26px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s var(--spring);
  box-shadow: 0 4px 14px rgba(249, 115, 22, 0.35);
  line-height: 1;
}

.add-btn:active {
  transform: scale(0.8);
}

.add-btn.added {
  animation: springBounce 0.6s var(--spring);
}

/* ===== ORDER BAR (Liquid Glass) ===== */
.order-bar {
  position: fixed;
  bottom: calc(var(--nav-height) + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(140px);
  width: calc(100% - 32px);
  max-width: 388px;
  background: rgba(249, 115, 22, 0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 22px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 8px 40px rgba(249, 115, 22, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
  transition: transform 0.6s var(--spring-smooth);
  z-index: 100;
  cursor: pointer;
}

.order-bar.visible {
  transform: translateX(-50%) translateY(0);
}

.order-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.order-count {
  width: 30px;
  height: 30px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.order-count.bounce {
  animation: bounceCount 0.5s var(--spring);
}

.order-bar-text {
  color: white;
  font-size: 15px;
  font-weight: 600;
}

.order-bar-total {
  color: white;
  font-size: 19px;
  font-weight: 800;
}

/* ===== BOTTOM NAV (Liquid Glass) ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: var(--nav-height);
  background: var(--glass-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
  box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.3s var(--spring);
  min-width: 44px;
  min-height: 44px;
  justify-content: center;
}

.nav-item.active {
  color: var(--c-primary);
}

.nav-item.active .nav-icon {
  transform: scale(1.1);
}

.nav-item:not(.active) {
  color: var(--c-text-muted);
}

.nav-item:active {
  transform: scale(0.9);
}

.nav-icon {
  font-size: 22px;
  transition: transform 0.3s var(--spring);
}

.nav-label {
  font-size: 11px;
  font-weight: 600;
}

/* ===== MODAL (Liquid Glass Backdrop) ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.modal-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--c-surface);
  width: 100%;
  max-width: 420px;
  max-height: 82vh;
  border-radius: 28px 28px 0 0;
  padding: 20px 20px 28px;
  transform: translateY(100%);
  transition: transform 0.55s var(--spring-smooth);
  overflow-y: auto;
  box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.15);
}

.modal-overlay.visible .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 40px;
  height: 5px;
  background: var(--c-border);
  border-radius: 3px;
  margin: 0 auto 20px;
}

.modal-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
  text-align: center;
}

.order-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--c-border);
}

.order-item:last-child {
  border-bottom: none;
}

.order-item-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.order-item-img {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  object-fit: cover;
}

.order-item-name {
  font-size: 15px;
  font-weight: 600;
}

.order-item-qty {
  font-size: 13px;
  color: var(--c-text-secondary);
  margin-top: 2px;
}

.order-item-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid var(--c-border);
  background: transparent;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--c-text);
  transition: all 0.2s var(--spring);
}

.qty-btn:active {
  transform: scale(0.85);
  background: var(--c-border);
}

.qty-display {
  font-size: 16px;
  font-weight: 700;
  min-width: 22px;
  text-align: center;
}

.order-item-price {
  font-size: 16px;
  font-weight: 700;
  color: var(--c-primary);
  margin-right: 8px;
}

.order-total-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 2px dashed var(--c-border);
}

.order-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 15px;
  color: var(--c-text-secondary);
}

.order-total-row.total {
  font-size: 20px;
  font-weight: 800;
  margin-top: 12px;
  color: var(--c-text);
}

.free-delivery {
  color: var(--c-success);
  font-weight: 600;
}

.checkout-btn {
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--c-primary-dark), var(--c-primary));
  color: white;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
  box-shadow: 0 6px 24px rgba(249, 115, 22, 0.35);
  transition: all 0.2s var(--spring);
}

.checkout-btn:active {
  transform: scale(0.97);
}

.empty-order {
  text-align: center;
  padding: 40px 20px;
  color: var(--c-text-secondary);
}

.empty-order-icon {
  font-size: 52px;
  margin-bottom: 12px;
}

.empty-order-text {
  font-size: 16px;
  font-weight: 500;
}

/* ===== ANIMATIONS ===== */
@keyframes springIn {
  0% {
    opacity: 0;
    transform: translateY(24px) scale(0.97);
  }
  60% {
    opacity: 1;
    transform: translateY(-4px) scale(1.01);
  }
  80% {
    transform: translateY(2px) scale(0.995);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes springBounce {
  0% { transform: scale(1); }
  20% { transform: scale(0.8); }
  40% { transform: scale(1.3); }
  60% { transform: scale(0.95); }
  80% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes bounceCount {
  0% { transform: scale(1); }
  30% { transform: scale(1.4); }
  60% { transform: scale(0.85); }
  80% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

@keyframes shimmer {
  0% {
    transform: translateX(-100%);
  }
  100% {
    transform: translateX(100%);
  }
}

@keyframes promoPulse {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(249, 115, 22, 0.25);
  }
  50% {
    box-shadow: 0 4px 28px rgba(249, 115, 22, 0.4);
  }
}

@keyframes promoGradient {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes promoShine {
  0%, 100% { transform: translate(-30%, -30%) rotate(0deg); }
  50% { transform: translate(30%, 30%) rotate(180deg); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <div>
      <h1 class="header-title">Foodie</h1>
      <p class="header-subtitle">מה בא לך לאכול היום?</p>
    </div>
    <div class="avatar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </div>
  <div class="search-container">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </span>
    <input type="text" class="search-input" placeholder="חיפוש מנות..." id="searchInput">
  </div>
</header>

<!-- Promo Banner -->
<div class="promo-banner">
  <span class="promo-icon">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.19M15 6h2a2 2 0 0 1 2 2v2M7 6h10l4 4v4a2 2 0 0 1-2 2h-1"/><circle cx="7.5" cy="18.5" r="2.5"/><circle cx="16.5" cy="18.5" r="2.5"/></svg>
  </span>
  <span class="promo-text">משלוח חינם בהזמנה מעל 80 שקלים!</span>
</div>

<!-- Categories -->
<div class="categories" id="categories">
  <button class="category-chip active" data-category="all">הכל</button>
  <button class="category-chip" data-category="burger">המבורגר</button>
  <button class="category-chip" data-category="sushi">סושי</button>
  <button class="category-chip" data-category="israeli">ישראלי</button>
  <button class="category-chip" data-category="pasta">פסטה</button>
</div>

<!-- Menu -->
<section class="menu-section">
  <h2 class="menu-section-title">פופולרי עכשיו</h2>
  <div class="menu-grid" id="menuGrid"></div>
</section>

<!-- Order Bar -->
<div class="order-bar" id="orderBar" onclick="openModal()">
  <div class="order-bar-right">
    <div class="order-count" id="orderCount">0</div>
    <span class="order-bar-text">צפה בהזמנה</span>
  </div>
  <div class="order-bar-total" id="orderTotal">&#8362;0</div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <span class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 8h-3v9h-5v-6h-2v6H6v-9H3l9-8z"/></svg>
    </span>
    <span class="nav-label">בית</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </span>
    <span class="nav-label">חיפוש</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </span>
    <span class="nav-label">הזמנות</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </span>
    <span class="nav-label">חשבון</span>
  </div>
</nav>

<!-- Order Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2 class="modal-title">ההזמנה שלך</h2>
    <div id="orderItems"></div>
    <div class="order-total-section" id="orderTotalSection" style="display:none;">
      <div class="order-total-row">
        <span>סכום ביניים</span>
        <span id="subtotalDisplay">&#8362;0</span>
      </div>
      <div class="order-total-row">
        <span>משלוח</span>
        <span id="deliveryDisplay" class="free-delivery">חינם</span>
      </div>
      <div class="order-total-row total">
        <span>סה"כ לתשלום</span>
        <span id="totalDisplay">&#8362;0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">לתשלום</button>
    </div>
  </div>
</div>

<script>
// Menu data with real food photo URLs
const menuItems = [
  {
    id: 1,
    name: 'המבורגר קלאסי',
    photo: 'https://picsum.photos/seed/burger/200/200',
    desc: '200 גרם בקר, חסה, עגבניה, בצל ורוטב סודי',
    price: 52,
    rating: 4.8,
    reviews: 124,
    category: 'burger'
  },
  {
    id: 2,
    name: 'פיצה מרגריטה',
    photo: 'https://picsum.photos/seed/pizza/200/200',
    desc: 'רוטב עגבניות, מוצרלה טרייה ובזיליקום',
    price: 48,
    rating: 4.6,
    reviews: 98,
    category: 'pasta'
  },
  {
    id: 3,
    name: 'שווארמה בפיתה',
    photo: 'https://picsum.photos/seed/kebab/200/200',
    desc: 'שווארמה טרייה עם חומוס, טחינה וסלט',
    price: 38,
    rating: 4.9,
    reviews: 201,
    category: 'israeli'
  },
  {
    id: 4,
    name: 'סושי מיקס',
    photo: 'https://picsum.photos/seed/sushi/200/200',
    desc: '12 יחידות מגוונות - סלמון, טונה ואבוקדו',
    price: 68,
    rating: 4.7,
    reviews: 87,
    category: 'sushi'
  },
  {
    id: 5,
    name: 'פסטה ברוטב',
    photo: 'https://picsum.photos/seed/pasta/200/200',
    desc: 'פסטה טרייה ברוטב שמנת פטריות וכמהין',
    price: 42,
    rating: 4.5,
    reviews: 76,
    category: 'pasta'
  },
  {
    id: 6,
    name: 'שקשוקה',
    photo: 'https://picsum.photos/seed/shakshuka/200/200',
    desc: 'ביצים ברוטב עגבניות חריף עם טחינה ולחם',
    price: 36,
    rating: 4.8,
    reviews: 156,
    category: 'israeli'
  }
];

// State
let order = {};
let activeCategory = 'all';

// Render menu
function renderMenu() {
  const grid = document.getElementById('menuGrid');
  const searchQuery = document.getElementById('searchInput').value.trim();

  grid.innerHTML = '';

  let visibleIndex = 0;
  menuItems.forEach((item) => {
    const matchesCategory = activeCategory === 'all' || item.category === activeCategory;
    const matchesSearch = !searchQuery || item.name.includes(searchQuery) || item.desc.includes(searchQuery);

    if (!matchesCategory || !matchesSearch) return;

    const card = document.createElement('div');
    card.className = 'menu-card';
    card.style.animationDelay = `${visibleIndex * 0.07}s`;

    card.innerHTML = `
      <div class="food-photo-wrap">
        <div class="skeleton" id="skeleton-${item.id}"></div>
        <img src="${item.photo}" alt="${item.name}" class="loading" onload="this.classList.remove('loading'); document.getElementById('skeleton-${item.id}').classList.add('hidden');" onerror="this.classList.remove('loading'); document.getElementById('skeleton-${item.id}').classList.add('hidden');">
        <div class="food-photo-gradient"></div>
      </div>
      <div class="menu-card-info">
        <div class="menu-card-name">${item.name}</div>
        <div class="menu-card-desc">${item.desc}</div>
        <div class="menu-card-bottom">
          <span class="menu-card-price">&#8362;${item.price}</span>
          <span class="menu-card-rating">
            <span class="star">&#9733;</span> ${item.rating} (${item.reviews})
          </span>
        </div>
      </div>
      <button class="add-btn" onclick="addToOrder(${item.id}, this)" aria-label="הוסף לסל">+</button>
    `;
    grid.appendChild(card);
    visibleIndex++;
  });
}

// Add to order
function addToOrder(id, btn) {
  if (order[id]) {
    order[id]++;
  } else {
    order[id] = 1;
  }

  // Spring bounce animation
  btn.classList.remove('added');
  void btn.offsetWidth;
  btn.classList.add('added');

  updateOrderBar();
}

// Update order bar
function updateOrderBar() {
  const totalItems = Object.values(order).reduce((a, b) => a + b, 0);
  const totalPrice = Object.entries(order).reduce((sum, [id, qty]) => {
    const item = menuItems.find(m => m.id === parseInt(id));
    return sum + (item.price * qty);
  }, 0);

  const orderBar = document.getElementById('orderBar');
  const countEl = document.getElementById('orderCount');
  const totalEl = document.getElementById('orderTotal');

  countEl.textContent = totalItems;
  totalEl.textContent = `₪${totalPrice}`;

  // Bounce animation on count
  countEl.classList.remove('bounce');
  void countEl.offsetWidth;
  countEl.classList.add('bounce');

  if (totalItems > 0) {
    orderBar.classList.add('visible');
  } else {
    orderBar.classList.remove('visible');
  }
}

// Open modal
function openModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('visible');
  renderOrderModal();
  document.body.style.overflow = 'hidden';
}

// Close modal
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('visible');
  document.body.style.overflow = '';
}

// Render order modal
function renderOrderModal() {
  const container = document.getElementById('orderItems');
  const totalSection = document.getElementById('orderTotalSection');

  const orderEntries = Object.entries(order).filter(([_, qty]) => qty > 0);

  if (orderEntries.length === 0) {
    container.innerHTML = `
      <div class="empty-order">
        <div class="empty-order-icon">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="var(--c-text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div class="empty-order-text">ההזמנה ריקה</div>
      </div>
    `;
    totalSection.style.display = 'none';
    return;
  }

  totalSection.style.display = 'block';

  let html = '';
  let subtotal = 0;

  orderEntries.forEach(([id, qty]) => {
    const item = menuItems.find(m => m.id === parseInt(id));
    const itemTotal = item.price * qty;
    subtotal += itemTotal;

    html += `
      <div class="order-item">
        <div class="order-item-right">
          <img class="order-item-img" src="${item.photo}" alt="${item.name}">
          <div>
            <div class="order-item-name">${item.name}</div>
            <div class="order-item-qty">₪${item.price} ליח'</div>
          </div>
        </div>
        <div class="order-item-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
          <span class="qty-display">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          <span class="order-item-price">₪${itemTotal}</span>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  const delivery = subtotal >= 80 ? 0 : 15;
  const total = subtotal + delivery;

  document.getElementById('subtotalDisplay').textContent = `₪${subtotal}`;
  document.getElementById('deliveryDisplay').textContent = delivery === 0 ? 'חינם' : `₪${delivery}`;
  document.getElementById('deliveryDisplay').className = delivery === 0 ? 'free-delivery' : '';
  document.getElementById('totalDisplay').textContent = `₪${total}`;
}

// Change quantity
function changeQty(id, delta) {
  if (!order[id]) return;
  order[id] += delta;
  if (order[id] <= 0) {
    delete order[id];
  }
  updateOrderBar();
  renderOrderModal();

  // Close modal if empty
  if (Object.keys(order).length === 0) {
    setTimeout(() => closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') }), 300);
  }
}

// Checkout
function checkout() {
  const totalItems = Object.values(order).reduce((a, b) => a + b, 0);
  if (totalItems === 0) return;

  alert('ההזמנה נשלחה בהצלחה!\nתודה שהזמנת מ-Foodie');
  order = {};
  updateOrderBar();
  closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') });
}

// Category click with spring animation
document.getElementById('categories').addEventListener('click', function(e) {
  const chip = e.target.closest('.category-chip');
  if (!chip) return;

  document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');

  // Spring scale effect on tap
  chip.style.transform = 'scale(0.9)';
  setTimeout(() => {
    chip.style.transform = '';
  }, 150);

  activeCategory = chip.dataset.category;
  renderMenu();
});

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  renderMenu();
});

// Bottom nav
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
  });
});

// Init
renderMenu();
</script>
</body>
</html>
