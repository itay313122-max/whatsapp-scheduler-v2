<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<title>Foodie</title>
<style>
:root {
  --bg: #ffffff;
  --bg-secondary: #f5f5f5;
  --surface: #ffffff;
  --text-primary: #111111;
  --text-secondary: #6b6b6b;
  --text-muted: #999999;
  --border: #ebebeb;
  --accent: #00B37E;
  --accent-light: rgba(0, 179, 126, 0.08);
  --star: #FF8A00;
  --nav-height: 56px;
  --radius: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111;
    --bg-secondary: #1a1a1a;
    --surface: #1e1e1e;
    --text-primary: #ffffff;
    --text-secondary: #a0a0a0;
    --text-muted: #666666;
    --border: #2a2a2a;
    --accent: #00B37E;
    --accent-light: rgba(0, 179, 126, 0.12);
    --star: #FF8A00;
  }
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-height) + 20px);
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.header {
  padding: 52px 20px 16px;
  background: var(--bg);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.header-brand {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-primary);
}

.header-location {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}

.header-location svg {
  flex-shrink: 0;
}

.header-location span {
  font-size: 13px;
  color: var(--text-secondary);
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
}

/* ===== SEARCH ===== */
.search-bar {
  position: relative;
  margin: 0 20px 16px;
}

.search-input {
  width: 100%;
  padding: 12px 16px 12px 40px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  outline: none;
  direction: rtl;
  transition: border-color 0.2s ease;
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--text-muted);
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--text-muted);
}

/* ===== CATEGORIES ===== */
.categories {
  padding: 0 20px 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.categories::-webkit-scrollbar {
  display: none;
}

.chip {
  flex-shrink: 0;
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
  user-select: none;
}

.chip.active {
  background: var(--text-primary);
  color: var(--bg);
  border-color: var(--text-primary);
}

/* ===== PROMO ===== */
.promo {
  margin: 0 20px 20px;
  padding: 16px 20px;
  background: var(--accent-light);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 14px;
  border: 1px solid rgba(0, 179, 126, 0.15);
}

.promo-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.promo-content {
  flex: 1;
}

.promo-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.promo-desc {
  font-size: 12px;
  color: var(--text-secondary);
}

/* ===== SECTION ===== */
.section {
  padding: 0 20px;
}

.section-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 14px;
  letter-spacing: -0.3px;
}

/* ===== FOOD CARDS ===== */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  display: flex;
  gap: 14px;
  align-items: stretch;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: background 0.15s ease;
}

.card:active {
  background: var(--bg-secondary);
}

.card-img {
  width: 120px;
  min-height: 120px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: var(--bg-secondary);
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-body {
  flex: 1;
  padding: 14px 14px 14px 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
}

.card-restaurant {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 3px;
}

.card-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 3px;
  line-height: 1.3;
}

.card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.card-rating {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
}

.card-rating svg {
  color: var(--star);
}

.card-time {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-secondary);
}

.card-price {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-right: auto;
}

/* ===== ADD BUTTON ===== */
.add-btn {
  position: absolute;
  bottom: 8px;
  left: 8px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.add-btn:active {
  transform: scale(0.85);
}

/* ===== ORDER BAR ===== */
.order-bar {
  position: fixed;
  bottom: calc(var(--nav-height) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  width: calc(100% - 40px);
  max-width: 380px;
  background: var(--accent);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(0, 179, 126, 0.3);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 100;
  cursor: pointer;
}

.order-bar.visible {
  transform: translateX(-50%) translateY(0);
}

.order-bar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.order-count {
  width: 24px;
  height: 24px;
  background: rgba(255,255,255,0.25);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}

.order-bar-text {
  color: #fff;
  font-size: 15px;
  font-weight: 600;
}

.order-bar-total {
  color: #fff;
  font-size: 16px;
  font-weight: 700;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: var(--nav-height);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  padding: 6px 16px;
  min-width: 44px;
  min-height: 44px;
  justify-content: center;
  color: var(--text-muted);
  transition: color 0.15s ease;
}

.nav-item.active {
  color: var(--text-primary);
}

.nav-label {
  font-size: 10px;
  font-weight: 500;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.modal-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg);
  width: 100%;
  max-width: 420px;
  max-height: 80vh;
  border-radius: 16px 16px 0 0;
  padding: 16px 20px 28px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow-y: auto;
}

.modal-overlay.visible .modal {
  transform: translateY(0);
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
}

.order-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.order-item:last-child {
  border-bottom: none;
}

.order-item-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.order-item-img {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  object-fit: cover;
}

.order-item-name {
  font-size: 14px;
  font-weight: 600;
}

.order-item-unit {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

.order-item-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-primary);
  transition: background 0.1s ease;
}

.qty-btn:active {
  background: var(--bg-secondary);
}

.qty-display {
  font-size: 14px;
  font-weight: 600;
  min-width: 18px;
  text-align: center;
}

.order-item-price {
  font-size: 14px;
  font-weight: 600;
  margin-right: 8px;
  min-width: 48px;
  text-align: left;
}

.order-total-section {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.order-total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 14px;
  color: var(--text-secondary);
}

.order-total-row.total {
  font-size: 17px;
  font-weight: 700;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  color: var(--text-primary);
}

.free-delivery {
  color: var(--accent);
  font-weight: 600;
}

.checkout-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.15s ease;
}

.checkout-btn:active {
  opacity: 0.85;
}

.empty-order {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

.empty-order-text {
  font-size: 15px;
  margin-top: 12px;
}
</style>
</head>

var order = {};
var activeCategory = 'all';

function starSVG() {
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--star)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
}

function clockSVG() {
  return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
}

function renderMenu() {
  var grid = document.getElementById('menuGrid');
  var query = document.getElementById('searchInput').value.trim();
  grid.innerHTML = '';

  menuItems.forEach(function(item) {
    var matchCat = activeCategory === 'all' || item.category === activeCategory;
    var matchSearch = !query || item.name.indexOf(query) !== -1 || item.desc.indexOf(query) !== -1 || item.restaurant.indexOf(query) !== -1;
    if (!matchCat || !matchSearch) return;

    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-img">' +
        '<img src="' + item.photo + '" alt="' + item.name + '" loading="lazy">' +
        '<button class="add-btn" onclick="event.stopPropagation(); addToOrder(' + item.id + ')" aria-label="הוסף">+</button>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-restaurant">' + item.restaurant + '</div>' +
        '<div class="card-name">' + item.name + '</div>' +
        '<div class="card-desc">' + item.desc + '</div>' +
        '<div class="card-meta">' +
          '<span class="card-rating">' + starSVG() + ' ' + item.rating + '</span>' +
          '<span class="card-time">' + clockSVG() + ' ' + item.time + ' דק\'</span>' +
          '<span class="card-price">&#8362;' + item.price + '</span>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
}

function addToOrder(id) {
  order[id] = (order[id] || 0) + 1;
  updateOrderBar();
}

function updateOrderBar() {
  var totalItems = 0;
  var totalPrice = 0;
  for (var id in order) {
    totalItems += order[id];
    var item = menuItems.find(function(m) { return m.id === parseInt(id); });
    if (item) totalPrice += item.price * order[id];
  }

  document.getElementById('orderCount').textContent = totalItems;
  document.getElementById('orderTotal').textContent = '₪' + totalPrice;

  var bar = document.getElementById('orderBar');
  if (totalItems > 0) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('visible');
  renderOrderModal();
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function renderOrderModal() {
  var container = document.getElementById('orderItems');
  var totalSection = document.getElementById('orderTotalSection');
  var entries = [];

  for (var id in order) {
    if (order[id] > 0) entries.push([id, order[id]]);
  }

  if (entries.length === 0) {
    container.innerHTML =
      '<div class="empty-order">' +
        '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>' +
        '<div class="empty-order-text">הסל ריק</div>' +
      '</div>';
    totalSection.style.display = 'none';
    return;
  }

  totalSection.style.display = 'block';
  var html = '';
  var subtotal = 0;

  entries.forEach(function(entry) {
    var id = entry[0];
    var qty = entry[1];
    var item = menuItems.find(function(m) { return m.id === parseInt(id); });
    var itemTotal = item.price * qty;
    subtotal += itemTotal;

    html +=
      '<div class="order-item">' +
        '<div class="order-item-right">' +
          '<img class="order-item-img" src="' + item.photo + '" alt="' + item.name + '">' +
          '<div>' +
            '<div class="order-item-name">' + item.name + '</div>' +
            '<div class="order-item-unit">₪' + item.price + ' ליחידה</div>' +
          '</div>' +
        '</div>' +
        '<div class="order-item-controls">' +
          '<button class="qty-btn" onclick="changeQty(' + item.id + ', -1)">-</button>' +
          '<span class="qty-display">' + qty + '</span>' +
          '<button class="qty-btn" onclick="changeQty(' + item.id + ', 1)">+</button>' +
          '<span class="order-item-price">₪' + itemTotal + '</span>' +
        '</div>' +
      '</div>';
  });

  container.innerHTML = html;

  var delivery = subtotal >= 80 ? 0 : 15;
  var total = subtotal + delivery;

  document.getElementById('subtotalDisplay').textContent = '₪' + subtotal;
  document.getElementById('deliveryDisplay').textContent = delivery === 0 ? 'חינם' : '₪' + delivery;
  document.getElementById('deliveryDisplay').className = delivery === 0 ? 'free-delivery' : '';
  document.getElementById('totalDisplay').textContent = '₪' + total;
}

function changeQty(id, delta) {
  if (!order[id]) return;
  order[id] += delta;
  if (order[id] <= 0) delete order[id];
  updateOrderBar();
  renderOrderModal();
  if (Object.keys(order).length === 0) {
    setTimeout(function() {
      closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') });
    }, 300);
  }
}

function checkout() {
  var totalItems = 0;
  for (var id in order) totalItems += order[id];
  if (totalItems === 0) return;
  alert('ההזמנה התקבלה בהצלחה!');
  order = {};
  updateOrderBar();
  closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') });
}

document.getElementById('categories').addEventListener('click', function(e) {
  var chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  activeCategory = chip.dataset.category;
  renderMenu();
});

document.getElementById('searchInput').addEventListener('input', function() {
  renderMenu();
});

document.querySelectorAll('.nav-item').forEach(function(item) {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    this.classList.add('active');
  });
});

renderMenu();
</script>
