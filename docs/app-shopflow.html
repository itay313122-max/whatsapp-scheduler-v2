<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<title>ShopFlow</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #ffffff;
  --bg-secondary: #fafafa;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #767676;
  --text-tertiary: #999999;
  --border: #e8e8e8;
  --border-light: #f0f0f0;
  --accent: #1a1a1a;
  --transition: all 0.2s ease;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-secondary: #0a0a0a;
    --surface: #000000;
    --text: #ffffff;
    --text-secondary: #999999;
    --text-tertiary: #666666;
    --border: #222222;
    --border-light: #1a1a1a;
    --accent: #ffffff;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  line-height: 1.4;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 48px 20px 12px;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-logo {
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-btn svg {
  width: 20px;
  height: 20px;
  stroke: var(--text);
}

.cart-count {
  position: absolute;
  top: -4px;
  right: -6px;
  background: var(--text);
  color: var(--bg);
  font-size: 9px;
  font-weight: 600;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

.cart-count.visible {
  display: flex;
}

/* Search */
.search-container {
  padding: 12px 20px;
}

.search-bar {
  display: flex;
  align-items: center;
  border: 1px solid var(--border);
  padding: 10px 14px;
  gap: 10px;
}

.search-bar svg {
  width: 16px;
  height: 16px;
  stroke: var(--text-tertiary);
  flex-shrink: 0;
}

.search-bar input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 14px;
  font-weight: 300;
  background: transparent;
  color: var(--text);
  direction: rtl;
}

.search-bar input::placeholder {
  color: var(--text-tertiary);
  font-weight: 300;
}

/* Tab system */
.tab-content {
  padding-bottom: 80px;
  min-height: calc(100vh - 120px);
}

.tab-page {
  display: none;
}

.tab-page.active {
  display: block;
}

/* Categories */
.categories {
  display: flex;
  gap: 0;
  padding: 0 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}

.categories::-webkit-scrollbar {
  display: none;
}

.cat-item {
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 400;
  white-space: nowrap;
  cursor: pointer;
  color: var(--text-tertiary);
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  letter-spacing: 0.3px;
}

.cat-item.active {
  color: var(--text);
  border-bottom-color: var(--text);
  font-weight: 500;
}

/* Section */
.section-header {
  padding: 24px 20px 16px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

.section-link {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-secondary);
  cursor: pointer;
  letter-spacing: 0.2px;
}

/* Product Grid */
.products-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border-light);
  padding: 0;
}

.product-card {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.product-card:active {
  opacity: 0.7;
}

.product-image-wrap {
  width: 100%;
  aspect-ratio: 4/5;
  position: relative;
  overflow: hidden;
  background: var(--bg-secondary);
}

.product-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.product-wishlist {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 32px;
  height: 32px;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
}

.product-wishlist svg {
  width: 18px;
  height: 18px;
  stroke: var(--text);
  stroke-width: 1.5;
  fill: none;
  transition: var(--transition);
}

.product-wishlist.liked svg {
  fill: var(--text);
}

.product-info {
  padding: 12px 14px 16px;
}

.product-name {
  font-size: 12px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 4px;
  letter-spacing: 0.1px;
}

.product-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.2px;
}

.product-price-old {
  font-size: 12px;
  font-weight: 300;
  color: var(--text-tertiary);
  text-decoration: line-through;
  margin-right: 6px;
}

.add-btn {
  margin-top: 10px;
  padding: 8px 0;
  width: 100%;
  border: 1px solid var(--text);
  background: none;
  color: var(--text);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
}

.add-btn:active {
  background: var(--text);
  color: var(--bg);
}

.add-btn.added {
  background: var(--text);
  color: var(--bg);
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 4px;
  padding-bottom: calc(4px + env(safe-area-inset-bottom));
  z-index: 1000;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 48px;
  padding: 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-tertiary);
  transition: color 0.15s ease;
  position: relative;
}

.nav-item.active {
  color: var(--text);
}

.nav-item svg {
  width: 20px;
  height: 20px;
  stroke-width: 1.5;
  margin-bottom: 2px;
}

.nav-item.active svg {
  stroke-width: 2;
}

.nav-item span {
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.5px;
}

.nav-item.active span {
  font-weight: 600;
}

.nav-badge {
  position: absolute;
  top: 0;
  right: 4px;
  background: var(--text);
  color: var(--bg);
  font-size: 8px;
  font-weight: 600;
  min-width: 14px;
  height: 14px;
  border-radius: 7px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 3px;
}

.nav-badge.visible {
  display: flex;
}

/* Cart Page */
.cart-page {
  padding: 20px;
}

.cart-empty {
  text-align: center;
  padding: 80px 20px;
}

.cart-empty svg {
  width: 40px;
  height: 40px;
  stroke: var(--text-tertiary);
  stroke-width: 1;
  margin-bottom: 16px;
}

.cart-empty h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text);
}

.cart-empty p {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-tertiary);
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border-light);
}

.cart-item-image {
  width: 64px;
  height: 80px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-secondary);
}

.cart-item-details {
  flex: 1;
  min-width: 0;
}

.cart-item-name {
  font-size: 13px;
  font-weight: 400;
  margin-bottom: 4px;
  color: var(--text);
}

.cart-item-price {
  font-size: 14px;
  color: var(--text);
  font-weight: 700;
}

.cart-item-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.qty-btn {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.qty-btn:active {
  background: var(--text);
  color: var(--bg);
}

.qty-value {
  font-size: 14px;
  font-weight: 500;
  min-width: 16px;
  text-align: center;
}

.cart-summary {
  padding: 20px 0;
  margin-top: 8px;
  border-top: 1px solid var(--border);
}

.cart-total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.cart-total-label {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
}

.cart-total-price {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}

.checkout-btn {
  width: 100%;
  padding: 16px;
  border: none;
  background: var(--text);
  color: var(--bg);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.2s ease;
}

.checkout-btn:active {
  opacity: 0.8;
}

/* Wishlist Page */
.wishlist-page {
  padding: 20px;
}

.wishlist-empty {
  text-align: center;
  padding: 80px 20px;
}

.wishlist-empty svg {
  width: 40px;
  height: 40px;
  stroke: var(--text-tertiary);
  stroke-width: 1;
  margin-bottom: 16px;
}

.wishlist-empty h3 {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 6px;
  color: var(--text);
}

.wishlist-empty p {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-tertiary);
}

/* Profile Page */
.profile-page {
  padding: 24px 20px;
}

.profile-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}

.profile-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.profile-avatar svg {
  width: 24px;
  height: 24px;
  stroke: var(--text-secondary);
  stroke-width: 1.5;
}

.profile-info {
  flex: 1;
}

.profile-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}

.profile-email {
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 300;
  margin-top: 2px;
}

.profile-menu-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: opacity 0.2s ease;
}

.profile-menu-item:active {
  opacity: 0.5;
}

.profile-menu-icon {
  width: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.profile-menu-icon svg {
  width: 18px;
  height: 18px;
  stroke: var(--text);
  stroke-width: 1.5;
}

.profile-menu-text {
  flex: 1;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
}

.profile-menu-arrow svg {
  width: 14px;
  height: 14px;
  stroke: var(--text-tertiary);
  stroke-width: 1.5;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text);
  color: var(--bg);
  padding: 12px 24px;
  font-size: 13px;
  font-weight: 400;
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  max-width: calc(100% - 40px);
  text-align: center;
  letter-spacing: 0.2px;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
}

.no-results p {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-tertiary);
}
</style>
</head>

var cart = [];
var wishlist = [];
var currentCategory = 'all';

function init() {
  renderProducts(products, 'products-grid');
  renderProducts(products, 'search-products-grid');
  renderCart();
}

function renderProducts(list, containerId) {
  var grid = document.getElementById(containerId);
  var noResultsId = containerId === 'products-grid' ? 'no-results' : 'search-no-results';

  if (list.length === 0) {
    grid.innerHTML = '';
    document.getElementById(noResultsId).style.display = 'block';
    return;
  }

  document.getElementById(noResultsId).style.display = 'none';

  grid.innerHTML = list.map(function(p) {
    var isLiked = wishlist.indexOf(p.id) !== -1;
    return '<div class="product-card">' +
      '<div class="product-image-wrap">' +
        '<img class="product-image" src="' + p.image + '" alt="' + p.name + '" loading="lazy">' +
        '<button class="product-wishlist' + (isLiked ? ' liked' : '') + '" onclick="event.stopPropagation(); toggleWishlist(' + p.id + ', this)">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="product-info">' +
        '<div class="product-name">' + p.name + '</div>' +
        '<div>' +
          '<span class="product-price">' + p.price + ' &#8362;</span>' +
          (p.oldPrice ? '<span class="product-price-old">' + p.oldPrice + ' &#8362;</span>' : '') +
        '</div>' +
        '<button class="add-btn" id="btn-' + containerId + '-' + p.id + '" onclick="event.stopPropagation(); addToCart(' + p.id + ', this)">' +
          'הוספה' +
        '</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleWishlist(productId, btn) {
  var idx = wishlist.indexOf(productId);
  if (idx === -1) {
    wishlist.push(productId);
    btn.classList.add('liked');
    showToast('נשמר במועדפים');
  } else {
    wishlist.splice(idx, 1);
    btn.classList.remove('liked');
    showToast('הוסר מהמועדפים');
  }
  renderWishlist();
}

function renderWishlist() {
  var container = document.getElementById('wishlist-content');
  if (wishlist.length === 0) {
    container.innerHTML =
      '<div class="wishlist-empty">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
          '<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>' +
        '</svg>' +
        '<h3>אין מועדפים עדיין</h3>' +
        '<p>לחצו על הלב כדי לשמור מוצרים</p>' +
      '</div>';
    return;
  }

  var items = products.filter(function(p) { return wishlist.indexOf(p.id) !== -1; });
  container.innerHTML = '<div class="products-grid">' + items.map(function(p) {
    return '<div class="product-card">' +
      '<div class="product-image-wrap">' +
        '<img class="product-image" src="' + p.image + '" alt="' + p.name + '" loading="lazy">' +
        '<button class="product-wishlist liked" onclick="event.stopPropagation(); toggleWishlist(' + p.id + ', this)">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="product-info">' +
        '<div class="product-name">' + p.name + '</div>' +
        '<div>' +
          '<span class="product-price">' + p.price + ' &#8362;</span>' +
          (p.oldPrice ? '<span class="product-price-old">' + p.oldPrice + ' &#8362;</span>' : '') +
        '</div>' +
        '<button class="add-btn" onclick="event.stopPropagation(); addToCart(' + p.id + ', this)">הוספה</button>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
}

function addToCart(productId, btnEl) {
  var product = products.filter(function(p) { return p.id === productId; })[0];
  var existing = cart.filter(function(i) { return i.id === productId; })[0];

  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, quantity: 1 });
  }

  btnEl.classList.add('added');
  btnEl.textContent = 'נוסף';
  setTimeout(function() {
    btnEl.classList.remove('added');
    btnEl.textContent = 'הוספה';
  }, 1200);

  updateCartBadge();
  showToast(product.name + ' נוסף לעגלה');
}

function updateCartBadge() {
  var total = cart.reduce(function(s, i) { return s + i.quantity; }, 0);
  var badge = document.getElementById('cart-badge');
  var headerCount = document.getElementById('header-cart-count');

  badge.textContent = total;
  headerCount.textContent = total;

  if (total > 0) {
    badge.classList.add('visible');
    headerCount.classList.add('visible');
  } else {
    badge.classList.remove('visible');
    headerCount.classList.remove('visible');
  }
}

function renderCart() {
  var container = document.getElementById('cart-content');

  if (cart.length === 0) {
    container.innerHTML =
      '<div class="section-header" style="padding-right:0;padding-left:0;">' +
        '<h2 class="section-title">העגלה</h2>' +
      '</div>' +
      '<div class="cart-empty">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
          '<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>' +
        '</svg>' +
        '<h3>העגלה ריקה</h3>' +
        '<p>המוצרים שתוסיפו יופיעו כאן</p>' +
      '</div>';
    return;
  }

  var total = cart.reduce(function(s, i) { return s + (i.price * i.quantity); }, 0);

  container.innerHTML =
    '<div class="section-header" style="padding-right:0;padding-left:0;">' +
      '<h2 class="section-title">העגלה</h2>' +
      '<span class="section-link">' + cart.length + ' פריטים</span>' +
    '</div>' +
    cart.map(function(item) {
      return '<div class="cart-item">' +
        '<img class="cart-item-image" src="' + item.image + '" alt="' + item.name + '">' +
        '<div class="cart-item-details">' +
          '<div class="cart-item-name">' + item.name + '</div>' +
          '<div class="cart-item-price">' + (item.price * item.quantity) + ' &#8362;</div>' +
        '</div>' +
        '<div class="cart-item-controls">' +
          '<button class="qty-btn" onclick="changeQty(' + item.id + ', -1)">&#8722;</button>' +
          '<span class="qty-value">' + item.quantity + '</span>' +
          '<button class="qty-btn" onclick="changeQty(' + item.id + ', 1)">+</button>' +
        '</div>' +
      '</div>';
    }).join('') +
    '<div class="cart-summary">' +
      '<div class="cart-total-row">' +
        '<span class="cart-total-label">סה"כ</span>' +
        '<span class="cart-total-price">' + total + ' &#8362;</span>' +
      '</div>' +
    '</div>' +
    '<button class="checkout-btn" onclick="checkout()">לתשלום</button>';
}

function changeQty(productId, delta) {
  var item = cart.filter(function(i) { return i.id === productId; })[0];
  if (!item) return;
  item.quantity += delta;
  if (item.quantity <= 0) {
    cart = cart.filter(function(i) { return i.id !== productId; });
  }
  updateCartBadge();
  renderCart();
}

function checkout() {
  showToast('ההזמנה נשלחה בהצלחה');
  cart = [];
  updateCartBadge();
  renderCart();
}

function filterByCategory(category, el) {
  currentCategory = category;
  document.querySelectorAll('.categories .cat-item').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');

  var filtered = category === 'all' ? products : products.filter(function(p) { return p.category === category; });
  renderProducts(filtered, 'products-grid');
}

function filterProducts() {
  var q = document.getElementById('search-input').value.trim();
  var filtered = products.filter(function(p) { return p.name.indexOf(q) !== -1; });
  if (currentCategory !== 'all') {
    filtered = filtered.filter(function(p) { return p.category === currentCategory; });
  }
  renderProducts(filtered, 'products-grid');
}

function filterProductsFromSearch() {
  var q = document.getElementById('search-input-2').value.trim();
  if (q === '') {
    renderProducts(products, 'search-products-grid');
    return;
  }
  var filtered = products.filter(function(p) { return p.name.indexOf(q) !== -1; });
  renderProducts(filtered, 'search-products-grid');
}

function switchTab(name) {
  document.querySelectorAll('.tab-page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(i) { i.classList.remove('active'); });

  document.getElementById('page-' + name).classList.add('active');
  var navBtn = document.querySelector('[data-tab="' + name + '"]');
  if (navBtn) navBtn.classList.add('active');

  if (name === 'cart') renderCart();
  if (name === 'wishlist') renderWishlist();
  if (name === 'search') {
    setTimeout(function() { document.getElementById('search-input-2').focus(); }, 200);
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

init();
</script>
</body>
</html>
