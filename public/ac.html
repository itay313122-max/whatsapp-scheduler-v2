<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>שלט מזגן – Tornado</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --blue: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #e3b341;
      --on-color: #00cfff;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    /* ── Top nav ──────────────────────────────────────── */
    .topbar {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .topbar a {
      color: var(--muted);
      font-size: .85rem;
      text-decoration: none;
    }
    .topbar a:hover { color: var(--text); }
    .topbar h1 { font-size: 1.1rem; color: var(--on-color); }

    /* ── Connection badge ─────────────────────────────── */
    #conn-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .8rem;
      cursor: pointer;
      user-select: none;
    }
    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }
    #conn-dot.ok { background: var(--green); }
    #conn-dot.warn { background: var(--yellow); }

    /* ── Remote body ──────────────────────────────────── */
    .remote {
      width: 100%;
      max-width: 360px;
      background: linear-gradient(160deg, #1c2333 0%, #111827 100%);
      border: 1px solid #2a3a50;
      border-radius: 32px;
      padding: 24px 20px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    }

    /* ── LCD Display ──────────────────────────────────── */
    .display {
      background: #020c14;
      border: 1px solid #0a2030;
      border-radius: 16px;
      padding: 18px 20px 14px;
      margin-bottom: 22px;
      text-align: center;
      position: relative;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.6);
    }
    .display.off { opacity: .35; }

    .display-brand {
      font-size: .65rem;
      letter-spacing: .15em;
      color: #2a5070;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .temp-main {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--on-color);
      text-shadow: 0 0 20px rgba(0,207,255,.4);
      letter-spacing: -.02em;
      transition: color .3s;
    }
    .display.off .temp-main { color: #1a3a50; text-shadow: none; }

    .temp-unit { font-size: 1.8rem; vertical-align: super; }

    .display-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 10px;
    }
    .display-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,207,255,.08);
      border: 1px solid rgba(0,207,255,.15);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: .78rem;
      color: var(--on-color);
      transition: background .2s;
    }
    .display.off .display-tag { background: transparent; color: #1a3a50; border-color: #0a2030; }

    .status-pill {
      position: absolute;
      top: 10px; left: 14px;
      font-size: .65rem;
      letter-spacing: .08em;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(63,185,80,.15);
      color: var(--green);
      border: 1px solid rgba(63,185,80,.25);
    }
    .status-pill.off {
      background: rgba(248,81,73,.1);
      color: var(--red);
      border-color: rgba(248,81,73,.2);
    }

    /* ── Power button ─────────────────────────────────── */
    .power-row {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }
    .power-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid #f85149;
      background: transparent;
      color: #f85149;
      font-size: 1.8rem;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 0 rgba(248,81,73,0);
    }
    .power-btn.on {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 16px rgba(63,185,80,.3);
    }
    .power-btn:active { transform: scale(.92); }

    /* ── Temperature control ──────────────────────────── */
    .temp-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 22px;
    }
    .temp-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.6rem;
      cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .temp-btn:hover { border-color: var(--on-color); color: var(--on-color); }
    .temp-btn:active { transform: scale(.88); }
    .temp-btn:disabled { opacity: .3; cursor: default; }
    .temp-label {
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Section headers ──────────────────────────────── */
    .section-label {
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px;
    }

    /* ── Mode buttons ─────────────────────────────────── */
    .mode-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .mode-btn {
      flex: 1;
      max-width: 62px;
      aspect-ratio: 1;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: .65rem;
      cursor: pointer;
      transition: all .18s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .mode-btn .icon { font-size: 1.4rem; }
    .mode-btn:hover { border-color: var(--on-color); color: var(--text); }
    .mode-btn.active {
      border-color: var(--on-color);
      background: rgba(0,207,255,.1);
      color: var(--on-color);
    }
    .mode-btn:disabled { opacity: .3; cursor: default; }

    /* ── Fan speed ────────────────────────────────────── */
    .fan-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .fan-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: .82rem;
      cursor: pointer;
      transition: all .18s;
    }
    .fan-btn:hover { border-color: var(--blue); color: var(--text); }
    .fan-btn.active {
      border-color: var(--blue);
      background: rgba(88,166,255,.1);
      color: var(--blue);
    }
    .fan-btn:disabled { opacity: .3; cursor: default; }

    /* ── Swing ────────────────────────────────────────── */
    .swing-row {
      display: flex;
      justify-content: center;
    }
    .swing-btn {
      padding: 9px 28px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: .85rem;
      cursor: pointer;
      transition: all .18s;
    }
    .swing-btn:hover { border-color: var(--yellow); color: var(--text); }
    .swing-btn.active {
      border-color: var(--yellow);
      background: rgba(227,179,65,.1);
      color: var(--yellow);
    }
    .swing-btn:disabled { opacity: .3; cursor: default; }

    /* ── IR feedback flash ────────────────────────────── */
    .ir-flash {
      position: fixed;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,207,255,.15);
      border: 1px solid rgba(0,207,255,.3);
      color: var(--on-color);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: .82rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
      z-index: 999;
      white-space: nowrap;
    }
    .ir-flash.show { opacity: 1; }
    .ir-flash.err { background: rgba(248,81,73,.15); border-color: rgba(248,81,73,.3); color: var(--red); }

    /* ── Setup panel ──────────────────────────────────── */
    .setup-panel {
      width: 100%;
      max-width: 360px;
      margin-top: 16px;
    }
    details { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
    summary {
      padding: 14px 18px;
      cursor: pointer;
      font-size: .9rem;
      color: var(--muted);
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    summary::after { content: '▾'; font-size: .8rem; }
    details[open] summary { color: var(--text); border-bottom: 1px solid var(--border); }

    .setup-body { padding: 16px 18px; }

    .field-group { margin-bottom: 14px; }
    .field-group label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 5px; }
    .field-group input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
    }
    .field-group input:focus { border-color: var(--blue); }

    .btn-row { display: flex; gap: 8px; }
    .btn-sm {
      flex: 1;
      padding: 9px 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .85rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-sm:hover { background: rgba(255,255,255,.05); }
    .btn-sm.primary { background: #1f6feb; border-color: #1f6feb; }
    .btn-sm.primary:hover { background: #388bfd; }

    /* ── Learn grid ───────────────────────────────────── */
    .learn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    .learn-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: .78rem;
      gap: 6px;
    }
    .learn-item .cmd-name { color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .learn-item .learned-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .learn-item .learned-dot.done { background: var(--green); }
    .learn-item .learn-btn {
      padding: 3px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .72rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .learn-item .learn-btn:hover { border-color: var(--on-color); color: var(--on-color); }
    .learn-item .learn-btn.learning { border-color: var(--yellow); color: var(--yellow); }

    .setup-msg { margin-top: 10px; font-size: .8rem; min-height: 18px; color: var(--green); }
    .setup-msg.err { color: var(--red); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/">← WhatsApp</a>
  <h1>🌀 שלט מזגן</h1>
  <div id="conn-badge" onclick="toggleSetup()">
    <div id="conn-dot"></div>
    <span id="conn-text">לא מחובר</span>
  </div>
</div>

<div id="ir-flash" class="ir-flash"></div>

<!-- ── REMOTE ── -->
<div class="remote">

  <!-- Display -->
  <div class="display off" id="display">
    <span class="status-pill off" id="power-pill">כבוי</span>
    <div class="display-brand">TORNADO · MASTER 35</div>
    <div class="temp-main"><span id="temp-val">24</span><span class="temp-unit">°</span></div>
    <div class="display-row">
      <span class="display-tag" id="mode-tag"><span id="mode-icon">❄️</span> <span id="mode-label">קירור</span></span>
      <span class="display-tag" id="fan-tag">🌀 <span id="fan-label">אוטו</span></span>
    </div>
  </div>

  <!-- Power -->
  <div class="power-row">
    <button class="power-btn" id="power-btn" onclick="cmd('power')" title="הפעל/כבה">⏻</button>
  </div>

  <!-- Temperature -->
  <div class="temp-row">
    <div>
      <button class="temp-btn" id="btn-up" onclick="cmd('temp_up')" disabled>▲</button>
      <div class="temp-label">חם יותר</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:.7rem;color:var(--muted);margin-bottom:4px">טמפרטורה</div>
      <div style="font-size:1.5rem;color:var(--on-color);font-weight:700;" id="temp-sub">24°C</div>
      <div style="font-size:.65rem;color:var(--muted);margin-top:2px">16°–30°C</div>
    </div>
    <div>
      <button class="temp-btn" id="btn-down" onclick="cmd('temp_down')" disabled>▼</button>
      <div class="temp-label">קר יותר</div>
    </div>
  </div>

  <!-- Modes -->
  <div class="section-label">מצב</div>
  <div class="mode-row">
    <button class="mode-btn" data-mode="cool" onclick="cmd('mode','cool')" disabled>
      <span class="icon">❄️</span>קירור
    </button>
    <button class="mode-btn" data-mode="heat" onclick="cmd('mode','heat')" disabled>
      <span class="icon">♨️</span>חימום
    </button>
    <button class="mode-btn" data-mode="fan"  onclick="cmd('mode','fan')"  disabled>
      <span class="icon">🌬️</span>מאוורר
    </button>
    <button class="mode-btn" data-mode="auto" onclick="cmd('mode','auto')" disabled>
      <span class="icon">🔄</span>אוטו
    </button>
    <button class="mode-btn" data-mode="dry"  onclick="cmd('mode','dry')"  disabled>
      <span class="icon">💧</span>ייבוש
    </button>
  </div>

  <!-- Fan speed -->
  <div class="section-label">מאוורר</div>
  <div class="fan-row">
    <button class="fan-btn" data-fan="auto"   onclick="cmd('fan','auto')"   disabled>אוטו</button>
    <button class="fan-btn" data-fan="low"    onclick="cmd('fan','low')"    disabled>1</button>
    <button class="fan-btn" data-fan="medium" onclick="cmd('fan','medium')" disabled>2</button>
    <button class="fan-btn" data-fan="high"   onclick="cmd('fan','high')"   disabled>3</button>
  </div>

  <!-- Swing -->
  <div class="swing-row">
    <button class="swing-btn" id="swing-btn" onclick="cmd('swing')" disabled>↕ סוויפ</button>
  </div>

</div>

<!-- ── SETUP PANEL ── -->
<div class="setup-panel">
  <details id="setup-details">
    <summary>⚙️ הגדרות Broadlink</summary>
    <div class="setup-body">

      <div class="field-group">
        <label>כתובת IP של ה-Broadlink RM (השאר ריק לחיפוש אוטומטי)</label>
        <input id="bl-host" type="text" placeholder="192.168.1.50" />
      </div>

      <div class="btn-row">
        <button class="btn-sm" onclick="discoverBL()">🔍 זיהוי אוטומטי</button>
        <button class="btn-sm primary" onclick="connectBL()">🔌 התחבר</button>
      </div>

      <p id="setup-msg" class="setup-msg"></p>

      <!-- Learning mode grid -->
      <div style="margin-top:18px;font-size:.82rem;color:var(--muted);">
        לימוד קודי IR – כוון את השלט המקורי של הטורנדו לכיוון ה-Broadlink ולחץ "למד":
      </div>
      <div class="learn-grid" id="learn-grid"></div>
    </div>
  </details>
</div>

<script>
  const COMMANDS = [
    { key: 'power_on',    label: 'הדלקה' },
    { key: 'power_off',   label: 'כיבוי' },
    { key: 'temp_up',     label: 'טמפ ▲' },
    { key: 'temp_down',   label: 'טמפ ▼' },
    { key: 'mode_cool',   label: '❄️ קירור' },
    { key: 'mode_heat',   label: '♨️ חימום' },
    { key: 'mode_fan',    label: '🌬️ מאוורר' },
    { key: 'mode_auto',   label: '🔄 אוטו' },
    { key: 'mode_dry',    label: '💧 ייבוש' },
    { key: 'fan_auto',    label: '🌀 אוטו' },
    { key: 'fan_low',     label: 'מהירות 1' },
    { key: 'fan_medium',  label: 'מהירות 2' },
    { key: 'fan_high',    label: 'מהירות 3' },
    { key: 'swing',       label: '↕ סוויפ' },
  ];

  const MODES = {
    cool: { icon: '❄️', label: 'קירור' },
    heat: { icon: '♨️', label: 'חימום' },
    fan:  { icon: '🌬️', label: 'מאוורר' },
    auto: { icon: '🔄', label: 'אוטו' },
    dry:  { icon: '💧', label: 'ייבוש' },
  };

  const FAN_LABELS = { auto: 'אוטו', low: 'נמוך', medium: 'בינוני', high: 'גבוה' };

  let state = { power: false, temperature: 24, mode: 'cool', fanSpeed: 'auto', swing: false };
  let learned = new Set();
  let blConnected = false;
  let activeLearn = null;

  function flash(msg, err = false) {
    const el = document.getElementById('ir-flash');
    el.textContent = msg;
    el.className = 'ir-flash show' + (err ? ' err' : '');
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'ir-flash'; }, 2000);
  }

  function renderState() {
    const on = state.power;
    document.getElementById('display').className = 'display' + (on ? '' : ' off');
    document.getElementById('power-pill').textContent = on ? 'פעיל' : 'כבוי';
    document.getElementById('power-pill').className = 'status-pill' + (on ? '' : ' off');
    document.getElementById('power-btn').className = 'power-btn' + (on ? ' on' : '');
    document.getElementById('temp-val').textContent = state.temperature;
    document.getElementById('temp-sub').textContent = state.temperature + '°C';
    document.getElementById('mode-icon').textContent = MODES[state.mode]?.icon || '❄️';
    document.getElementById('mode-label').textContent = MODES[state.mode]?.label || state.mode;
    document.getElementById('fan-label').textContent = FAN_LABELS[state.fanSpeed] || state.fanSpeed;

    // Enable/disable controls
    const ctrlBtns = document.querySelectorAll('.temp-btn, .mode-btn, .fan-btn, .swing-btn');
    ctrlBtns.forEach(b => b.disabled = !on);

    // Active highlights
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === state.mode);
    });
    document.querySelectorAll('.fan-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.fan === state.fanSpeed);
    });
    document.getElementById('swing-btn').classList.toggle('active', state.swing);
  }

  function renderConnection() {
    const dot = document.getElementById('conn-dot');
    const txt = document.getElementById('conn-text');
    dot.className = blConnected ? 'ok' : '';
    txt.textContent = blConnected ? 'מחובר' : 'לא מחובר';
  }

  function renderLearnGrid() {
    const grid = document.getElementById('learn-grid');
    grid.innerHTML = COMMANDS.map(c => `
      <div class="learn-item">
        <span class="learned-dot ${learned.has(c.key) ? 'done' : ''}"></span>
        <span class="cmd-name">${c.label}</span>
        <button class="learn-btn ${activeLearn === c.key ? 'learning' : ''}"
                onclick="startLearn('${c.key}', this)"
                id="lb-${c.key}">
          ${activeLearn === c.key ? '⏳ מחכה...' : (learned.has(c.key) ? '↺ שוב' : 'למד')}
        </button>
      </div>
    `).join('');
  }

  async function cmd(action, value) {
    try {
      const body = { action };
      if (value !== undefined) body.value = value;
      const res = await fetch('/api/ac/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.success) {
        state = data.state;
        renderState();
        if (data.irSent) flash('📡 ' + (data.irKey || action));
        else if (blConnected && !data.irSent) flash(`⚠️ קוד "${data.irKey}" לא נלמד`, true);
      }
    } catch (e) { flash('שגיאה: ' + e.message, true); }
  }

  async function discoverBL() {
    setMsg('🔍 מחפש...', false);
    try {
      const res = await fetch('/api/broadlink/discover', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        blConnected = true;
        setMsg('✓ נמצא: ' + data.device.host, false);
        renderConnection();
      } else {
        setMsg(data.error, true);
      }
    } catch (e) { setMsg(e.message, true); }
  }

  async function connectBL() {
    const host = document.getElementById('bl-host').value.trim();
    if (!host) return discoverBL();
    setMsg('🔌 מתחבר...', false);
    try {
      const res = await fetch('/api/broadlink/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ host }),
      });
      const data = await res.json();
      if (data.success) {
        blConnected = true;
        setMsg('✓ מחובר ל-' + data.device.host, false);
        renderConnection();
      } else {
        setMsg(data.error, true);
      }
    } catch (e) { setMsg(e.message, true); }
  }

  async function startLearn(command, btn) {
    if (!blConnected) { setMsg('חבר Broadlink קודם', true); return; }
    activeLearn = command;
    renderLearnGrid();
    setMsg('⏳ לחץ על הכפתור בשלט המקורי תוך 15 שניות...', false);
    try {
      const res = await fetch('/api/broadlink/learn', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command }),
      });
      const data = await res.json();
      if (data.success) {
        learned.add(command);
        setMsg(`✓ "${command}" נלמד בהצלחה!`, false);
      } else {
        setMsg(data.error, true);
      }
    } catch (e) { setMsg(e.message, true); }
    activeLearn = null;
    renderLearnGrid();
  }

  function setMsg(text, isErr) {
    const el = document.getElementById('setup-msg');
    el.textContent = text;
    el.className = 'setup-msg' + (isErr ? ' err' : '');
  }

  function toggleSetup() {
    const d = document.getElementById('setup-details');
    d.open = !d.open;
  }

  async function poll() {
    try {
      const [stateRes, blRes] = await Promise.all([
        fetch('/api/ac/state'),
        fetch('/api/broadlink/status'),
      ]);
      const stData = await stateRes.json();
      const blData = await blRes.json();
      state = { power: stData.power, temperature: stData.temperature, mode: stData.mode, fanSpeed: stData.fanSpeed, swing: stData.swing };
      learned = new Set(stData.learnedCommands || []);
      blConnected = blData.connected;
      renderState();
      renderConnection();
      renderLearnGrid();
    } catch (_) {}
  }

  poll();
  setInterval(poll, 3000);
</script>
</body>
</html>
